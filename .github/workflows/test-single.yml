name: Test Single Architecture

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build qualcommax only
        run: |
          set -e
          
          echo "=== Building PHTunnel for qualcommax (aarch64) ==="
          
          # Download SDK
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/qualcommax/ipq807x/openwrt-sdk-25.12.2-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          
          mkdir -p build
          cd build
          
          echo "Downloading SDK..."
          curl -fL "$SDK_URL" -o sdk.tar.zst
          
          echo "Extracting SDK..."
          zstd -d sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar
          rm -f sdk.tar.zst
          
          # Setup SDK
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk
          
          # Enable APK format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          echo "Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package files
          echo "Copying package files..."
          mkdir -p package/phtunnel
          mkdir -p package/luci-app-phtunnel
          cp -r "${GITHUB_WORKSPACE}/phtunnel/Makefile" package/phtunnel/
          find "${GITHUB_WORKSPACE}/phtunnel" -maxdepth 1 -name "*.lua" -exec cp {} package/phtunnel/ \;
          find "${GITHUB_WORKSPACE}/phtunnel" -maxdepth 1 -name "*.htm" -exec cp {} package/phtunnel/ \;
          cp "${GITHUB_WORKSPACE}/luci-app-phtunnel/Makefile" package/luci-app-phtunnel/
          find "${GITHUB_WORKSPACE}/luci-app-phtunnel" -maxdepth 1 -name "*.lua" -exec cp {} package/luci-app-phtunnel/ \;
          find "${GITHUB_WORKSPACE}/luci-app-phtunnel" -maxdepth 1 -name "*.htm" -exec cp {} package/luci-app-phtunnel/ \;
          # Copy binaries separately to package directory for Makefile access
          cp -r "${GITHUB_WORKSPACE}/phtunnel/binaries" package/phtunnel/binaries
          
          # Set environment variables
          export ARCH="aarch64"
          export BINARY_ARCH="aarch64"
          export CONFIG_USE_APK=y
          
          # Configure build
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          make oldconfig
          
          # Build packages with verbose output
          echo "Building packages with full verbose output..."
          make package/phtunnel/compile V=s 2>&1 | tee full_build.log || true
          make package/luci-app-phtunnel/compile V=s 2>&1 | tee luci_build.log || true
          
          echo "=== Build completed ==="
          echo "Checking for APKs..."
          find bin -name "*phtunnel*.apk" -exec ls -lh {} \;
          
          echo "=== Full build logs ==="
          echo "--- phtunnel build log last 50 lines ---"
          tail -50 full_build.log
          echo "--- luci-app-phtunnel build log last 50 lines ---"
          tail -50 luci_build.log
          
          # Collect APKs
          echo "=== Collecting APK packages ==="
          mkdir -p "${GITHUB_WORKSPACE}/build/apks"
          find bin -name "*phtunnel*.apk" -exec cp {} "${GITHUB_WORKSPACE}/build/apks/" \;
          
          echo "=== APK packages collected ==="
          ls -lh "${GITHUB_WORKSPACE}/build/apks/"
          
          APK_COUNT=$(find "${GITHUB_WORKSPACE}/build/apks" -name '*.apk' 2>/dev/null | wc -l)
          echo "Total APK packages: $APK_COUNT"
          
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK packages generated"
            exit 1
          fi
          
          echo "✅ Build completed successfully"
      
      - name: Upload APK artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-single
          path: build/apks/*.apk
          
      - name: Create Release
        if: success()
        run: |
          set -e
          
          cd build/apks
          
          APK_SIZE=$(ls -lh phtunnel*.apk | awk '{print $5}')
          
          # Create release notes
          cat > release_notes.md << EOF
          # PHTunnel v1.0.0-r3 for OpenWrt 25.12.x - Single Architecture Test
          
          ## Successfully Built Architecture
          - **qualcommax (aarch64_cortex-a53)** ✅
          
          ## Package Information
          - Package size: $APK_SIZE
          - Version: 1.0.0-r3
          
          ## Installation
          1. Download appropriate APK packages
          2. Install core: \`opkg install phtunnel_1.0.0-r3.apk\`
          3. Install web interface: \`opkg install luci-app-phtunnel_1.0.0-r3.apk\`
          
          ## Project Status
          - ✅ Single architecture build working
          - ✅ APK format support
          - ✅ Core package and web interface included
          
          ## System Requirements
          - OpenWrt 25.12.x
          - APK package support
          - Architecture: aarch64_cortex-a53 (qualcommax)
          
          ## Features
          - HSK intranet penetration support
          - Web-based configuration interface
          - TCP/HTTP/HTTPS protocol support
          - End-to-end TLS encryption
          - Black/white list verification
          
          ## Current Status
          - Working on: Single architecture verification
          - Next: Multi-architecture expansion
          - Goal: All major OpenWrt 25.12.x architectures
          EOF
          
          # Create release
          RELEASE_TAG="v1.0.0-r3-single"
          
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Updating existing release..."
            gh release edit "$RELEASE_TAG" --notes-file release_notes.md
          else
            echo "Creating new release..."
            gh release create "$RELEASE_TAG" \
              --title "PHTunnel v1.0.0-r3 for OpenWrt 25.12.x - Single Test" \
              --notes-file release_notes.md \
              phtunnel*.apk
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}