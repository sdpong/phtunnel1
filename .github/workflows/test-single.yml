name: Build Single Architecture Test

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture'
        required: true
        type: string
        default: 'qualcommax'
        options:
          - 'qualcommax'
          - 'x86_64'
          - 'mediatek'
          - 'ramips'
          - 'ath79'
          - 'bcm27xx'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build single architecture
        run: |
          set -e
          
          echo "=== Building single architecture test ==="
          
          # Get target architecture
          target="${{ github.event.inputs.target }}"
          echo "Building target: $target"
          
          # Define architectures with correct SDK paths and binary mappings
          declare -A ARCH_MAP
          ARCH_MAP[qualcommax]="qualcommax:ipq807x:aarch64"
          ARCH_MAP[x86_64]="x86:x86_64:x86_64"
          ARCH_MAP[mediatek]="mediatek:mt7622:armv7"
          ARCH_MAP[ramips]="ramips:mt7620:mipsel"
          ARCH_MAP[ath79]="ath79:generic:mips"
          ARCH_MAP[bcm27xx]="bcm27xx:bcm2711:armv7"
          
          if [ -z "${ARCH_MAP[$target]}" ]; then
            echo "Invalid target: $target"
            exit 1
          fi
          
          IFS=':' read -r arch_name subdir binary_dir <<< "${ARCH_MAP[$target]}"
          
          echo "Configuration: $arch_name/$subdir, binary: $binary_dir"
          
          # Determine SDK URL
          if [ "$arch_name" = "x86" ]; then
            SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          else
            SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/${arch_name}/${subdir}/openwrt-sdk-25.12.2-${arch_name}-${subdir}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          fi
          echo "SDK URL: $SDK_URL"
          
          # Download and extract SDK
          mkdir -p build
          cd build
          
          echo "Downloading SDK..."
          if ! curl -fL "$SDK_URL" -o sdk.tar.zst; then
            echo "ERROR: Failed to download SDK"
            exit 1
          fi
          
          echo "Extracting SDK..."
          zstd -d sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar
          
          # Find extracted directory
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk*")
          mv "$SDK_DIR" openwrt-sdk
          
          cd openwrt-sdk
          
          # Configure APK format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          echo "Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package files
          echo "Copying package files..."
          cp -r "${GITHUB_WORKSPACE}/phtunnel" package/
          cp -r "${GITHUB_WORKSPACE}/luci-app-phtunnel" package/
          
          # Copy binaries directory structure
          echo "Copying binaries directory..."
          mkdir -p package/phtunnel/binaries
          cp -r "${GITHUB_WORKSPACE}/phtunnel/binaries" package/phtunnel/
          chmod +x package/phtunnel/binaries/*/phtunnel
          
          echo "Verifying binaries:"
          ls -lh package/phtunnel/binaries/*/phtunnel
          
          # Set environment variables
          echo "Setting ARCH=$binary_dir, BINARY_ARCH=$binary_dir"
          export ARCH="$binary_dir"
          export BINARY_ARCH="$binary_dir"
          export CONFIG_USE_APK=y
          
          # Configure build
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          make oldconfig
          
          # Build packages
          echo "Building phtunnel package..."
          make package/phtunnel/compile V=s 2>&1 | tee phtunnel_build.log || {
            echo "=== PHTUNNEL BUILD FAILED ==="
            cat phtunnel_build.log
            exit 1
          }
          
          echo "Building luci-app-phtunnel package..."
          make package/luci-app-phtunnel/compile V=s 2>&1 | tee luci_build.log || {
            echo "=== LUCI BUILD FAILED ==="
            cat luci_build.log
            exit 1
          }
          
          # Check for APK packages
          echo "=== Checking for APK packages ==="
          echo "All files in bin directory:"
          find bin -type f | head -20
          echo ""
          echo "Looking for phtunnel APKs:"
          find bin -name "phtunnel*.apk" -exec ls -lh {} \; || echo "No phtunnel APKs found"
          echo ""
          echo "Looking for luci-app-phtunnel APKs:"
          find bin -name "luci-app-phtunnel*.apk" -exec ls -lh {} \; || echo "No luci-app-phtunnel APKs found"
          echo ""
          echo "All APK files:"
          find bin -name "*.apk" -exec ls -lh {} \; || echo "No APK files found"
          
          # Collect APKs
          mkdir -p ../apks
          find bin -name "phtunnel*.apk" -exec cp {} ../apks/ \;
          find bin -name "luci-app-phtunnel*.apk" -exec cp {} ../apks/ \;
          
          echo "=== APK packages collected ==="
          ls -lh ../apks/
          
          APK_COUNT=$(find ../apks -name '*.apk' | wc -l)
          echo "Total APK packages: $APK_COUNT"
          
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK packages generated"
            exit 1
          fi
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-${{ github.event.inputs.target }}
          path: build/apks/*.apk