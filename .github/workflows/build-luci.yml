name: Build luci-app-phtunnel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download and extract SDK
        run: |
          set -x
          
          echo "=== Building luci-app-phtunnel ==="
          
          # Download SDK
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/qualcommax/ipq807x/openwrt-sdk-25.12.2-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          
          curl -fL "$SDK_URL" -o sdk.tar.zst
          tar -xf sdk.tar.zst
          rm -f sdk.tar.zst
          
          # Setup SDK
          find . -maxdepth 1 -name "openwrt-sdk*" -type d -exec mv {} openwrt-sdk \;
          cd openwrt-sdk
          
          # Enable APK format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package files
          mkdir -p package/luci-app-phtunnel
          cp -r "${GITHUB_WORKSPACE}/luci-app-phtunnel"/* package/luci-app-phtunnel/
          
          # Configure build
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          make oldconfig
          
          # Build luci-app-phtunnel with detailed logging
          echo "Building luci-app-phtunnel with full logging..."
          if make package/luci-app-phtunnel/compile V=s 2>&1 | tee luci-build.log; then
            echo "✅ luci-app-phtunnel build succeeded"
            echo "=== Build log summary ==="
            tail -20 luci-build.log
          else
            echo "❌ luci-app-phtunnel build failed"
            echo "=== Build log summary ==="
            tail -20 luci-build.log
            cat luci-build.log | grep -A 10 -B 5 "ERROR\|error\|missing\|undefined" || true
            exit 1
          fi
          
          # Collect APK
          echo "=== Checking for luci-app-phtunnel APK ==="
          find bin -name "luci-app-phtunnel*.apk" -exec ls -lh {} \;
          
          APK_COUNT=$(find bin -name "luci-app-phtunnel*.apk" | wc -l)
          echo "Total luci-app-phtunnel APKs: $APK_COUNT"
          
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No luci-app-phtunnel APK generated"
            exit 1
          fi
          
          echo "✅ luci-app-phtunnel build completed"
      
      - name: Upload APK artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-phtunnel-apk
          path: bin/*luci-app-phtunnel*.apk
          
      - name: Create Release
        if: success()
        run: |
          set -x
          
          echo "=== Creating luci-app-phtunnel Release ==="
          
          APK_FILE=$(find bin -name "luci-app-phtunnel*.apk" | head -1)
          APK_SIZE=$(ls -lh "$APK_FILE" | awk '{print $5}')
          
          # Create release notes
          cat > release_notes.md << 'EOF'
          # luci-app-phtunnel v1.0.0 for OpenWrt 25.12.x
          
          ## Successfully Built Architecture
          - **qualcommax (aarch64_cortex-a53)** ✅
          
          ## Package Information
          - Package: luci-app-phtunnel_1.0.0-r1.apk
          - Size: $APK_SIZE
          - Version: 1.0.0-r1
          
          ## Installation
          ```bash
          opkg install luci-app-phtunnel_1.0.0-r1.apk
          ```
          
          ## Features
          - Web-based PHTunnel configuration interface
          - LuCI integration
          - Support for HSK intranet penetration configuration
          
          ## System Requirements
          - OpenWrt 25.12.x
          - LuCI web interface
          - Architecture: aarch64_cortex-a53 (qualcommax)
          
          ## Project Status
          - ✅ LuCI interface build successful
          - ✅ APK format support
          - ✅ Web configuration interface
          EOF
          
          # Create release
          RELEASE_TAG="luci-app-phtunnel-v1.0.0-r1"
          
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Updating existing release..."
            gh release edit "$RELEASE_TAG" --notes-file release_notes.md
          else
            echo "Creating new release..."
            gh release create "$RELEASE_TAG" \
              --title "luci-app-phtunnel v1.0.0-r1 for OpenWrt 25.12.x" \
              --notes-file release_notes.md \
              "$APK_FILE"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}