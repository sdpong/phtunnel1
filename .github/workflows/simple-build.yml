name: Build PHTunnel Single Arch

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download and extract SDK
        run: |
          set -e
          
          echo "=== Single Arch Build ==="
          
          # Download SDK
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/qualcommax/ipq807x/openwrt-sdk-25.12.2-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          
          curl -fL "$SDK_URL" -o sdk.tar.zst
          
          zstd -d sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar
          rm -f sdk.tar.zst
          
          # Setup SDK
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk
          
          # Enable APK format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package files
          mkdir -p package/phtunnel
          cp -r "${GITHUB_WORKSPACE}/phtunnel"/* package/phtunnel/
          
          # Set environment variables
          export ARCH="aarch64"
          export BINARY_ARCH="aarch64"
          export CONFIG_USE_APK=y
          
          # Configure build
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          make oldconfig
          
          # Build phtunnel
          echo "Building phtunnel package..."
          if make package/phtunnel/compile V=s; then
            echo "✅ phtunnel build succeeded"
          else
            echo "❌ phtunnel build failed"
            exit 1
          fi
          
          # Collect APK
          find bin -name "phtunnel*.apk" -exec ls -lh {} \;
          
          APK_COUNT=$(find bin -name "phtunnel*.apk" | wc -l)
          echo "Total APKs: $APK_COUNT"
          
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APKs found"
            exit 1
          fi
          
          echo "✅ Build completed"
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-single-apk
          path: bin/phtunnel*.apk
          
      - name: Create Release
        if: success()
        run: |
          set -e
          
          # Create release
          echo "Creating release..."
          
          APK_FILE=$(find bin -name "phtunnel*.apk" | head -1)
          APK_SIZE=$(ls -lh bin/phtunnel*.apk | awk '{print $5}')
          
          # Create release notes
          cat > release_notes.md << EOF
          # PHTunnel v1.0.0 for OpenWrt 25.12.x
          
          ## Package Information
          - **Version**: 1.0.0
          - **Architecture**: aarch64_cortex-a53
          - **Size**: $APK_SIZE
          - **Format**: APK
          
          ## Installation
          1. Download: \`phtunnel_1.0.0.apk\`
          2. Install: \`opkg install phtunnel_1.0.0.apk\`
          
          ## Project Status
          - ✅ Build system working
          - ✅ Single architecture support
          - ✅ APK format support
          - ✅ Release automation
          
          ## System Requirements
          - OpenWrt 25.12.x
          - aarch64_cortex-a53 (qualcommax)
          
          EOF
          
          # Create release
          RELEASE_TAG="v1.0.0"
          
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Updating existing release..."
            gh release edit "$RELEASE_TAG" --notes-file release_notes.md
          else
            echo "Creating new release..."
            gh release create "$RELEASE_TAG" \
              --title "PHTunnel v1.0.0 for OpenWrt 25.12.x" \
              --notes-file release_notes.md \
              "$APK_FILE"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}