name: Test build logic

on:
  workflow_dispatch:

jobs:
  test-binary-copy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Test binary copy logic
        run: |
          echo "=== Testing binary copy logic ==="
          
          # Simulate workflow architecture
          WORK_DIR="$HOME/test_build"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"
          
          # Copy package files (simulating GITHUB_WORKSPACE content)
          mkdir -p phtunnel
          mkdir -p luci-app-phtunnel
          
          cat > phtunnel/Makefile << 'MAKFILE'
include \$(TOPDIR)/rules.mk

PKG_NAME:=phtunnel
PKG_VERSION:=1.0.0
PKG_RELEASE:=2
PKG_HASH:=skip
PKG_FLAGS:=nonshared
PKG_MAINTAINER:=Oray <developer@oray.com>
PKG_LICENSE:=Proprietary

include \$(INCLUDE_DIR)/package.mk

define Package/phtunnel
  SECTION:=net
  CATEGORY:=Network
  SUBMENU:=Web Servers/Proxies
  DEPENDS:=+libc +libpthread +librt
  TITLE:=HSK Intranet penetration
  URL:=https://hsk.oray.com/
  MAINTAINER:=Oray <developer@oray.com>
  LICENSE:=Proprietary
endef

define Build/Prepare
	mkdir -p \$(PKG_BUILD_DIR)
	BINARY_FILE="./binaries/\$(BINARY_ARCH)/phtunnel"
	if [ -f "\$(BINARY_FILE)" ]; then \
		cp "\$(BINARY_FILE)" "\$(PKG_BUILD_DIR)/phtunnel"; \
		chmod +x "\$(PKG_BUILD_DIR)/phtunnel"; \
	else \
		echo "Error: phtunnel binary not found: \$(BINARY_ARCH)"; \
		ls -la ./binaries/"; \
		exit 1; \
	fi
endef

define Build/Configure
	true
endef

define Build/Compile
	true
endef

define Package/phtunnel/install
	\$(INSTALL_DIR) \$(1)/etc/init.d
	\$(INSTALL_DIR) \$(1)/etc/config
	\$(INSTALL_DIR) \$(1)/etc/hotplug.d/iface
	\$(INSTALL_DIR) \$(1)/usr/sbin
	\$(INSTALL_BIN) \$(PKG_BUILD_DIR)/phtunnel \$(1)/usr/sbin/
endef

\$(eval \$(call BuildPackage,phtunnel))
MAKFILE
