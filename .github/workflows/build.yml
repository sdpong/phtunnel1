name: Build PHTunnel APK

on:
  workflow_dispatch:

  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - name: x86_64
            arch: x86_64
          - name: aarch64
            arch: aarch64
          - name: armv7
            arch: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 unzip rsync subversion \
            xsltproc zlib1g-dev

      - name: Test
        run: echo "Building for ${{ matrix.target.arch }}"

      - name: Test Upload
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.target.name }}
          path: README.md
