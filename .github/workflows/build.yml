name: Build PHTunnel for OpenWrt 25.12.x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build PHTunnel core
        run: |
          set -e
          
          echo "=== Building PHTunnel core package ==="
          
          # Download SDK
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/qualcommax/ipq807x/openwrt-sdk-25.12.2-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          
          mkdir -p build
          cd build
          
          echo "Downloading SDK..."
          curl -fL "$SDK_URL" -o sdk.tar.zst
          
          echo "Extracting SDK..."
          zstd -d sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar
          rm -f sdk.tar.zst
          
          # Setup SDK
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk
          
          # Enable APK format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          echo "Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package files
          echo "Copying package files..."
          mkdir -p package/phtunnel
          mkdir -p package/luci-app-phtunnel
          cp -r "${GITHUB_WORKSPACE}/phtunnel"/* package/phtunnel/
          cp -r "${GITHUB_WORKSPACE}/luci-app-phtunnel"/* package/luci-app-phtunnel/
          
          # Set environment variables
          export ARCH="aarch64"
          export BINARY_ARCH="aarch64"
          export CONFIG_USE_APK=y
          
          # Configure build
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          make oldconfig
          
          # Build packages
          echo "Building packages..."
          
          # Build phtunnel (use existing working Makefile)
          if make package/phtunnel/compile V=s; then
            echo "✅ phtunnel build succeeded"
          else
            echo "❌ phtunnel build failed"
            exit 1
          fi
          
          # Build luci-app-phtunnel  
          if make package/luci-app-phtunnel/compile V=s; then
            echo "✅ luci-app-phtunnel build succeeded"
          else
            echo "❌ luci-app-phtunnel build failed"
            # Don't exit on luci-app-phtunnel failure as it might not generate APK
          fi
          
          # Collect APKs
          echo "=== Checking for APK packages ==="
          find bin -name "*.apk" -exec ls -lh {} \;
          
          echo "=== Collecting all packages ==="
          mkdir -p "${GITHUB_WORKSPACE}/build/apks"
          find bin -name "*.apk" -exec cp {} "${GITHUB_WORKSPACE}/build/apks/" \;
          
          echo "=== APK packages collected ==="
          ls -lh "${GITHUB_WORKSPACE}/build/apks/"
          
          APK_COUNT=$(find "${GITHUB_WORKSPACE}/build/apks" -name '*.apk' 2>/dev/null | wc -l)
          echo "Total APK packages: $APK_COUNT"
          
          # Only fail if phtunnel failed and no APKs
          PHTUNEL_APK=$(find "${GITHUB_WORKSPACE}/build/apks" -name 'phtunnel*.apk' 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ] || [ "$PHTUNEL_APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK packages generated"
            exit 1
          fi
          
          # Build luci-app-phtunnel  
          if make package/luci-app-phtunnel/compile V=s; then
            echo "✅ luci-app-phtunnel build succeeded"
          else
            echo "❌ luci-app-phtunnel build failed"
            exit 1
          fi
          
          if make package/luci-app-phtunnel/compile V=s; then
            echo "✅ luci-app-phtunnel build succeeded"
          else
            echo "❌ luci-app-phtunnel build failed"
            exit 1
          fi
          
          # Collect APKs
          echo "=== Checking for all package files ==="
          find bin -name "*.apk" -exec ls -lh {} \;
          
          echo "=== Collecting all packages ==="
          mkdir -p "${GITHUB_WORKSPACE}/build/apks"
          find bin -name "*.apk" -exec cp {} "${GITHUB_WORKSPACE}/build/apks/" \;
          
          echo "=== APK packages collected ==="
          ls -lh "${GITHUB_WORKSPACE}/build/apks/"
          
          APK_COUNT=$(find "${GITHUB_WORKSPACE}/build/apks" -name '*.apk' 2>/dev/null | wc -l)
          echo "Total APK packages: $APK_COUNT"
          
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK packages generated"
            exit 1
          fi
          
          echo "✅ Build completed successfully"
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-qualcommax
          path: build/apks/*.apk
          
      - name: Create Release
        if: success()
        run: |
          set -e
          
          cd build/apks
          
          APK_SIZE=$(ls -lh phtunnel*.apk | awk '{print $5}')
          
          # Create release notes
          cat > release_notes.md << EOF
          # PHTunnel v1.0.0-r3 for OpenWrt 25.12.x
          
          ## Successfully Built Architecture
          - **qualcommax (aarch64_cortex-a53)** ✅
          
          ## Package Information
          - **Core Package**: phtunnel_1.0.0-r2.apk
          - **Web Interface**: luci-app-phtunnel_1.0.0-r1.apk
          - Total packages: $APK_COUNT
          
          ## Installation
          1. Download phtunnel_1.0.0-r2.apk
          2. Download luci-app-phtunnel_1.0.0-r1.apk
          3. Install core: \`opkg install phtunnel_1.0.0-r2.apk\`
          4. Install web interface: \`opkg install luci-app-phtunnel_1.0.0-r1.apk\`
          
          ## Project Status
          - ✅ Build system working
          - ✅ APK format support
          - ✅ Core package built
          - ✅ LuCI web interface built
          - ✅ Release creation working
          
          ## System Requirements
          - OpenWrt 25.12.x
          - APK package support
          - Architecture: aarch64_cortex-a53 (qualcommax)
          - LuCI web interface support
          
          ## Features
          - HSK intranet penetration support
          - Web-based configuration interface
          - TCP/HTTP/HTTPS protocol support
          - End-to-end TLS encryption
          - Black/white list verification
          
          ## Current Status
          - ✅ Complete package ecosystem working
          - Next: Multi-architecture expansion
          - Goal: All major OpenWrt 25.12.x architectures
          EOF
          
          # Create release
          RELEASE_TAG="v1.0.0-r3"
          
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Updating existing release..."
            gh release edit "$RELEASE_TAG" --notes-file release_notes.md
          else
            echo "Creating new release..."
            gh release create "$RELEASE_TAG" \
              --title "PHTunnel v1.0.1 for OpenWrt 25.12.x" \
              --notes-file release_notes.md \
              phtunnel*.apk
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}