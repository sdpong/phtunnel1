name: Build PHTunnel for OpenWrt 25.12.x

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - x86-64
          - qualcommax-ipq807x
          - ramips-mt7621
          - ramips-mt7620
          - ath79-generic
          - bcm27xx-bcm2712
          - mediatek-filogic
        default: all
      create_release:
        description: 'Create GitHub Release after build'
        required: false
        type: boolean
        default: false

env:
  PKG_NAME: phtunnel
  LUCI_PKG_NAME: luci-app-phtunnel
  PKG_VERSION: 1.0.0
  PKG_RELEASE: 4
  OPENWRT_VERSION: 25.12.1

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${{ env.PKG_VERSION }}-${{ env.PKG_RELEASE }}-$(date +%Y%m%d)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set build matrix
        id: set_matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ "${{ inputs.target }}" != "all" ]]; then
            echo 'matrix=["${{ inputs.target }}"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["x86-64","qualcommax-ipq807x","ramips-mt7621","ramips-mt7620","ath79-generic","bcm27xx-bcm2712","mediatek-filogic"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.prepare.outputs.matrix) }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git g++ libelf-dev libncurses5-dev libssl-dev zlib1g-dev

      - name: Get SDK info
        id: sdk_info
        run: |
          case "${{ matrix.arch }}" in
            x86-64)
              echo "arch=x86" >> $GITHUB_OUTPUT
              echo "subarch=x86-64" >> $GITHUB_OUTPUT
              echo "sdk_subarch=x86-64" >> $GITHUB_OUTPUT
              ;;
            qualcommax-ipq807x)
              echo "arch=qualcommax" >> $GITHUB_OUTPUT
              echo "subarch=ipq807x" >> $GITHUB_OUTPUT
              echo "sdk_subarch=ipq807x" >> $GITHUB_OUTPUT
              ;;
            ramips-mt7621)
              echo "arch=ramips" >> $GITHUB_OUTPUT
              echo "subarch=mt7621" >> $GITHUB_OUTPUT
              echo "sdk_subarch=mt7621" >> $GITHUB_OUTPUT
              ;;
            ramips-mt7620)
              echo "arch=ramips" >> $GITHUB_OUTPUT
              echo "subarch=mt7620" >> $GITHUB_OUTPUT
              echo "sdk_subarch=mt7620" >> $GITHUB_OUTPUT
              ;;
            ath79-generic)
              echo "arch=ath79" >> $GITHUB_OUTPUT
              echo "subarch=generic" >> $GITHUB_OUTPUT
              echo "sdk_subarch=generic" >> $GITHUB_OUTPUT
              ;;
            bcm27xx-bcm2712)
              echo "arch=bcm27xx" >> $GITHUB_OUTPUT
              echo "subarch=bcm2712" >> $GITHUB_OUTPUT
              echo "sdk_subarch=bcm2712" >> $GITHUB_OUTPUT
              ;;
            mediatek-filogic)
              echo "arch=mediatek" >> $GITHUB_OUTPUT
              echo "subarch=filogic" >> $GITHUB_OUTPUT
              echo "sdk_subarch=filogic" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unsupported architecture: ${{ matrix.arch }}"
              exit 1
              ;;
          esac
          echo "Target architecture: ${{ matrix.arch }}"

      - name: Cache OpenWrt SDK
        uses: actions/cache@v4
        with:
          path: |
            sdk
            sdk.tar.zst
          key: sdk-${{ env.OPENWRT_VERSION }}-${{ steps.sdk_info.outputs.arch }}-${{ steps.sdk_info.outputs.subarch }}
          restore-keys: |
            sdk-${{ env.OPENWRT_VERSION }}-${{ steps.sdk_info.outputs.arch }}-
            sdk-${{ env.OPENWRT_VERSION }}-

      - name: Download OpenWrt SDK
        run: |
          if [ ! -d "sdk" ]; then
            echo "Downloading OpenWrt SDK..."
            
            SDK_RELEASE="https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ steps.sdk_info.outputs.arch }}/${{ steps.sdk_info.outputs.subarch }}/openwrt-imagebuilder-${{ steps.sdk_info.outputs.arch }}-${{ steps.sdk_info.outputs.sdk_subarch }}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            
            if curl -fL "$SDK_RELEASE" -o sdk.tar.zst 2>/dev/null; then
              echo "Downloaded release SDK"
            else
              echo "Failed to download SDK"
              exit 1
            fi
            
            tar -xf sdk.tar.zst
            mv openwrt-imagebuilder-* sdk
          else
            echo "Using cached SDK"
          fi

      - name: Setup feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy packages
        run: |
          cp -r luci-app-phtunnel sdk/package/
          cp -r phtunnel sdk/package/

      - name: Configure build
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-json=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          make oldconfig

      - name: Build packages
        run: |
          cd sdk
          echo "Building phtunnel package..."
          make package/phtunnel/compile V=s 2>&1 | tee build.log || true
          echo "Building luci-app-phtunnel package..."
          make package/luci-app-phtunnel/compile V=s 2>&1 | tee -a build.log || true

      - name: Collect packages
        run: |
          mkdir -p release/${{ matrix.arch }}
          
          find sdk/bin/packages -name "*.ipk" 2>/dev/null | while read pkg; do
            cp "$pkg" release/${{ matrix.arch }}/
          done
          
          if [ -f "sdk/build.log" ]; then
            cp sdk/build.log release/${{ matrix.arch }}/
          fi
          
          echo "Packages for ${{ matrix.arch }}:"
          ls -lh release/${{ matrix.arch }}/ || echo "No packages found"

      - name: Verify packages
        run: |
          cd release/${{ matrix.arch }}
          
          pkg_count=$(find . -name "*.ipk" | wc -l)
          echo "Found $pkg_count package(s)"
          
          if [ "$pkg_count" -eq 0 ]; then
            echo "No packages found!"
            exit 1
          fi
          
          for pkg in *.ipk; do
            if [ -f "$pkg" ]; then
              echo "Verifying $pkg:"
              file "$pkg"
              size=$(stat -c%s "$pkg")
              echo "  Size: $size bytes"
              
              if [ "$size" -lt 1000 ]; then
                echo "Warning: Package $pkg is suspiciously small"
              fi
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-${{ matrix.arch }}-${{ needs.prepare.outputs.version }}
          path: release/${{ matrix.arch }}/*
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "### Build Summary for ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh release/${{ matrix.arch }}/ 2>/dev/null || echo "No packages found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_release:
    needs: [prepare, build]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true) ||
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Prepare release
        run: |
          mkdir -p release
          
          find packages -type f -name "*.ipk" | while read pkg; do
            cp "$pkg" release/
          done
          
          echo "Release packages:"
          ls -lh release/

      - name: Generate release notes
        run: |
          cat > release_notes.md << 'EOF'
          ## PHTunnel ${{ needs.prepare.outputs.version }} for OpenWrt 25.12.x
          
          ### 支持的路由器架构
          
          | 架构 | 芯片/平台 | 设备示例 |
          |------|-----------|---------|
          | x86-64 | x86_64 | 通用 x86_64 路由器、软路由 |
          | qualcommax-ipq807x | Qualcomm IPQ807x | 小米 AX3600/AX9000、红米 AX6、红魔 AX7、华硕 RT-AX89X 等 |
          | ramips-mt7621 | MediaTek MT7621 | 斐讯 K3、小米路由器 4A、中兴、TP-Link 等 |
          | ramips-mt7620 | MediaTek MT7620/MT7628 | 小米路由器 4C、部分 TP-Link 等 |
          | ath79-generic | Atheros AR71xx/AR9xxx | TP-Link WR842N、NanoStation 等 |
          | bcm27xx-bcm2712 | Broadcom BCM2712 | 树莓派 5 |
          | mediatek-filogic | MediaTek Filogic (MT7986) | 红米 AX6000、TP-Link XDR6088 等 |
          
          ### 安装方法
          
          #### 方法 1: 通过 opkg 安装
          
          ```bash
          # 1. 下载对应架构的 IPK 包
          # 2. 上传到路由器
          scp phtunnel_*.ipk luci-app-phtunnel_*.ipk root@<路由器IP>:/tmp/
          
          # 3. SSH 连接到路由器并安装
          ssh root@<路由器IP>
          cd /tmp
          opkg install phtunnel_*.ipk luci-app-phtunnel_*.ipk
          
          # 4. 启用并启动服务
          /etc/init.d/phtunnel enable
          /etc/init.d/phtunnel start
          ```
          
          ### 配置
          1. 访问 LuCI: `http://<路由器IP>/cgi-bin/luci`
          2. 进入 服务 → PHTunnel
          3. 启用服务
          4. 配置参数
          
          ### 本版本更新
          - 适配 OpenWrt 25.12.x
          - 支持主流路由器架构
          - 完整的 RPC 权限配置
          - 改进的错误处理和日志
          - 支持多芯片平台编译
          
          ---
          
          ### 包列表
          EOF
          
          for pkg in release/*.ipk; do
            if [ -f "$pkg" ]; then
              name=$(basename "$pkg")
              size=$(stat -c%s "$pkg")
              size_kb=$(echo "scale=2; $size / 1024" | bc)
              echo "- \`$name\` ($size_kb KB)" >> release_notes.md
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: PHTunnel ${{ needs.prepare.outputs.version }} for OpenWrt 25.12.x
          body_path: release_notes.md
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
