name: Build PHTunnel APK for OpenWrt 25.12.x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build working architecture (qualcommax)
        run: |
          set -e
          
          echo "=== Building qualcommax (aarch64_cortex-a53) ==="
          
          # Download SDK
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/qualcommax/ipq807x/openwrt-sdk-25.12.2-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "Downloading SDK from: $SDK_URL"
          
          mkdir -p build
          cd build
          
          curl -fL "$SDK_URL" -o sdk.tar.zst
          zstd -d sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar
          rm -f sdk.tar sdk.tar.zst
          
          # Setup SDK
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk
          
          # Enable APK format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          echo "Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package files
          echo "Copying package files..."
          mkdir -p package/phtunnel
          cp -r "${GITHUB_WORKSPACE}/phtunnel"/* package/phtunnel/
          
          # Set environment variables
          export ARCH="aarch64"
          export BINARY_ARCH="aarch64"
          export CONFIG_USE_APK=y
          
          # Configure build
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          make oldconfig
          
          # Build phtunnel
          echo "Building phtunnel package..."
          make package/phtunnel/compile V=s
          
          # Collect APKs
          echo "=== Checking for APK packages ==="
          find bin -name "phtunnel*.apk" -exec ls -lh {} \;
          
          mkdir -p apks
          find bin -name "phtunnel*.apk" -exec cp {} apks/ \;
          
          echo "=== APK packages collected ==="
          ls -lh apks/
          
          APK_COUNT=$(find apks -name '*.apk' | wc -l)
          echo "Total APK packages: $APK_COUNT"
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-qualcommax
          path: build/apks/*.apk
          if-no-files-found: ignore
          
      - name: Create Release
        if: success()
        run: |
          set -e
          
          cd build/apks
          
          APK_SIZE=$(ls -lh phtunnel-1.0.0-r2.apk | awk '{print $5}' 2>/dev/null || echo "Unknown")
          APK_COUNT=$(ls *.apk | wc -l)
          
          # Create release notes
          cat > release_notes.md << EOF
          # PHTunnel v1.0.3 for OpenWrt 25.12.x
          
          ## Successfully Built Architectures
          - **qualcommax (aarch64_cortex-a53)** ✅
          
          ## Package Information
          - Total packages: $APK_COUNT
          - Package size: $APK_SIZE
          - Version: 1.0.0-r2
          
          ## Installation
          1. Download the appropriate APK for your architecture
          2. Install using: \`opkg install phtunnel_1.0.0-r2.apk\`
          
          ## Project Status
          - ✅ Build system working
          - ✅ Core package successfully building
          - ✅ APK format support
          - ✅ Artifact upload working
          - ✅ Release automation working
          
          ## System Requirements
          - OpenWrt 25.12.x
          - APK package support
          - Architecture: aarch64_cortex-a53 (qualcommax)
          EOF
          
          # Check if release exists
          if gh release view v1.0.3 >/dev/null 2>&1; then
            echo "Updating existing release..."
            gh release edit v1.0.3 --notes-file release_notes.md
          else
            echo "Creating new release..."
            gh release create v1.0.3 \
              --title "PHTunnel v1.0.3 for OpenWrt 25.12.x" \
              --notes-file release_notes.md \
              *.apk
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}