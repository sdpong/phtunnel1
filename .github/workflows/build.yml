name: Build PHTunnel APK for OpenWrt 25.12.x

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target architecture (qualcommax, x86, mediatek, ramips, ath79, rockchip, bcm27xx)'
        required: true
        type: string
        default: 'qualcommax'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - architecture: qualcommax
            target: qualcommax
            arch: ipq807x
            cpu: aarch64
          - architecture: x86
            target: x86
            arch: "64"
            cpu: x86_64
          - architecture: mediatek
            target: mediatek
            arch: mt7622
            cpu: armv7
          - architecture: ramips
            target: ramips
            arch: mt7620
            cpu: mipsel
          - architecture: ath79
            target: ath79
            arch: generic
            cpu: mips
          - architecture: rockchip
            target: rockchip
            arch: generic
            cpu: aarch64
          - architecture: bcm27xx
            target: bcm27xx
            arch: bcm2711
            cpu: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Prepare environment
        if: inputs.architecture == 'all' || contains(matrix.architecture, inputs.architecture)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git g++ libelf-dev libncurses5-dev libssl-dev zstd wget

      - name: Download OpenWrt 25.12.2 SDK
        if: inputs.architecture == 'all' || contains(matrix.architecture, inputs.architecture)
        run: |
          TARGET="${{ matrix.target }}"
          ARCH="${{ matrix.arch }}"
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/${TARGET}/${ARCH}/openwrt-sdk-25.12.2-${ARCH}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "Downloading SDK from: $SDK_URL"
          echo "Target: ${TARGET}/${ARCH}"
          curl -L "$SDK_URL" -o sdk.tar.zst
          echo "Extracting SDK with zstd..."
          zstd -d sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar
          SDK_DIR=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
          if [ -n "$SDK_DIR" ]; then
            mv "$SDK_DIR" sdk
            echo "SDK extracted successfully"
          else
            echo "Error: SDK directory not found"
            exit 1
          fi

      - name: Setup build environment
        if: inputs.architecture == 'all' || contains(matrix.architecture, inputs.architecture)
        run: |
          cd sdk
          
          # Enable APK package format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          echo "Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package source
          echo "Copying package files..."
          cp -r ../phtunnel package/
          cp -r ../luci-app-phtunnel package/
          
          # Configure build options
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          make oldconfig

      - name: Build phtunnel package
        if: inputs.architecture == 'all' || contains(matrix.architecture, inputs.architecture)
        run: |
          cd sdk
          echo "Building phtunnel package for ${{ matrix.target }}/${{ matrix.arch }}..."
          export CONFIG_USE_APK=y
          make package/phtunnel/compile V=s || true

      - name: Build luci-app-phtunnel package
        if: inputs.architecture == 'all' || contains(matrix.architecture, inputs.architecture)
        run: |
          cd sdk
          echo "Building luci-app-phtunnel package for ${{ matrix.target }}/${{ matrix.arch }}..."
          export CONFIG_USE_APK=y
          make package/luci-app-phtunnel/compile V=s || true

      - name: Find APK packages
        if: inputs.architecture == 'all' || contains(matrix.architecture, inputs.architecture)
        run: |
          cd sdk
          echo "=== Searching for APK packages ==="
          APK_FILES=$(find bin/packages -name "*.apk" 2>/dev/null)
          if [ -z "$APK_FILES" ]; then
            echo "WARNING: No APK packages found"
          else
            echo "SUCCESS: APK packages found:"
            echo "$APK_FILES" | xargs -I {} ls -lh
          fi

      - name: Upload APK artifacts
        if: inputs.architecture == 'all' || contains(matrix.architecture, inputs.architecture)
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-${{ matrix.target }}-${{ matrix.cpu }}
          path: sdk/bin/packages/**/*.apk
          if-no-files-found: warning

      - name: Collect all artifacts
        if: inputs.architecture == 'all'
        run: |
          mkdir -p packages
          find sdk/bin/packages -name "*.apk" -exec cp {} packages/ \;
          echo "Total APK packages: $(find packages -name '*.apk' | wc -l)"
          ls -lh packages/

      - name: Upload all artifacts
        if: inputs.architecture == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-all-architectures
          path: packages/**

      - name: Create release on success
        if: success() && inputs.architecture == 'all'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sdk
          
          echo "Creating release notes..."
          cat > release_notes.md << 'EOF'
          ## PHTunnel v1.0.0-2 - OpenWrt 25.12.x APK Format
          
          **Fixed "unexpected end of file" installation error**
          
          ### Changes
          - Updated to OpenWrt 25.12.2 SDK
          - Correctly configured APK package format (CONFIG_USE_APK=y)
          - Used local pre-compiled binaries
          - Fixed SDK extraction with proper zstd command
          - Added support for 7 mainstream architectures
          
          ### Architectures Built
          - qualcommax/ipq807x (aarch64)
          - x86/64 (x86_64)
          - mediatek/mt7622 (armv7)
          - ramips/mt7620 (mipsel)
          - ath79/generic (mips)
          - rockchip/generic (aarch64)
          - bcm27xx/bcm2711 (armv7)
          
          ### Installation
          Download the APK package for your architecture and install:
          \`\`\`bash
          apk add phtunnel-1.0.0-2_*.apk
          apk add luci-app-phtunnel-1.0.0-2_all.apk
          \`\`\`
          
          **Note**: This version ONLY supports OpenWrt 25.12.x and above.
          EOF
          
          # Create or update release
          if git tag -l "v1.0.0-2" | grep -q .; then
            echo "Updating existing release v1.0.0-2"
            gh release delete v1.0.0-2 || true
          fi
          
          gh release create v1.0.0-2 \
            --title "PHTunnel v1.0.0-2 for OpenWrt 25.12.x" \
            --notes-file release_notes.md \
            packages/**/*.apk