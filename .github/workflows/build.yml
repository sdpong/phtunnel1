name: Build All PHTunnel Packages for OpenWrt 25.12.x

on:
  workflow_dispatch:

jobs:
  build_all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build all mainstream architectures
        run: |
          set -e
          
          echo "=== Building all mainstream architectures ==="
          
          # Define architectures
          declare -A ARCH_MAP
          ARCH_MAP[qualcommax]="qualcommax:ipq807x:aarch64"
          ARCH_MAP[x86_64]="x86:64:x86_64"
          ARCH_MAP[mediatek]="mediatek:mt7622:armv7"
          ARCH_MAP[ramips]="ramips:mt7620:mipsel"
          ARCH_MAP[ath79]="ath79:generic:mips"
          ARCH_MAP[bcm27xx]="bcm27xx:bcm2711:armv7"
          
          BUILD_DIR="build_multi"
          mkdir -p "$BUILD_DIR/apks_all"
          
          # Track successful builds
          SUCCESSFUL_ARCHS=""
          
          for arch_key in "${!ARCH_MAP[@]}"; do
            IFS=':' read -r target arch_name binary_dir <<< "${ARCH_MAP[$arch_key]}"
            
            echo "=== Building $arch_key ($target/$arch_name, binary: $binary_dir) ==="
            
            WORK_DIR="$BUILD_DIR/$arch_key"
            mkdir -p "$WORK_DIR"
            
            # Download SDK
            echo "Downloading SDK..."
            cd "$WORK_DIR"
            
            if [ "$target" = "x86" ]; then
              SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            else
              SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/${target}/${arch_name}/openwrt-sdk-25.12.2-${target}-${arch_name}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            fi
            
            if ! curl -fL "$SDK_URL" -o sdk.tar.zst; then
              echo "ERROR: Failed to download SDK for $arch_key"
              continue
            fi
            
            # Extract SDK
            echo "Extracting SDK..."
            zstd -d sdk.tar.zst -o sdk.tar
            tar -xf sdk.tar
            rm -f sdk.tar sdk.tar.zst
            
            # Find and setup SDK
            SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk*")
            if [ -z "$SDK_DIR" ]; then
              echo "ERROR: Could not find SDK directory for $arch_key"
              continue
            fi
            
            mv "$SDK_DIR" openwrt-sdk
            cd openwrt-sdk
            
            # Enable APK format
            echo "CONFIG_USE_APK=y" >> .config
            
            # Update feeds
            echo "Updating feeds..."
            ./scripts/feeds update -a
            ./scripts/feeds install -a
            
            # Copy package files
            echo "Copying package files..."
            mkdir -p package/phtunnel
            cp -r "${GITHUB_WORKSPACE}/phtunnel"/* package/phtunnel/
            
            # Set environment variables
            export ARCH="$binary_dir"
            export BINARY_ARCH="$binary_dir"
            export CONFIG_USE_APK=y
            
            # Configure build
            echo "Configuring build..."
            make defconfig
            echo "CONFIG_PACKAGE_phtunnel=y" >> .config
            make oldconfig
            
            # Build phtunnel
            echo "Building phtunnel package for $arch_key..."
            if make package/phtunnel/compile V=s; then
              echo "✅ phtunnel build succeeded for $arch_key"
              SUCCESSFUL_ARCHS="$SUCCESSFUL_ARCHS $arch_key "
              
              # Copy APKs
              find bin -name "phtunnel*.apk" -exec cp {} "$BUILD_DIR/apks_all/" \;
            else
              echo "❌ phtunnel build failed for $arch_key"
              continue
            fi
            
            # Build luci-app-phtunnel
            echo "Building luci-app-phtunnel package for $arch_key..."
            if make package/luci-app-phtunnel/compile V=s; then
              echo "✅ luci-app-phtunnel build succeeded for $arch_key"
              SUCCESSFUL_ARCHS="$SUCCESSFUL_ARCHS luci-app-phtunnel "
              
              # Copy APKs
              find bin -name "luci-app-phtunnel*.apk" -exec cp {} "$BUILD_DIR/apks_all/" \;
            else
              echo "❌ luci-app-phtunnel build failed for $arch_key"
            fi
            
            cd "$BUILD_DIR"
            echo "=== Completed $arch_key build ==="
            echo ""
          done
          
          # Summary
          echo "=== Build Summary ==="
          echo "Successful architectures: $SUCCESSFUL_ARCHS"
          
          TOTAL_APKS=$(find apks_all -name "*.apk" 2>/dev/null | wc -l)
          echo "Total APK packages: $TOTAL_APKS"
          
          if [ "$TOTAL_APKS" -eq 0 ]; then
            echo "ERROR: No APK packages generated"
            exit 1
          fi
          
          echo "✅ All builds completed successfully"
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apks-multiarch
          path: build_multi/apks_all/*.apk
          
      - name: Create Release
        if: success()
        run: |
          set -e
          
          cd build_multi/apks_all
          
          # Count APKs
          TOTAL_APKS=$(find . -name "*.apk" | wc -l)
          PHTUNNEL_COUNT=$(find . -name "phtunnel*.apk" | wc -l)
          LUCI_COUNT=$(find . -name "luci-app-phtunnel*.apk" | wc -l)
          
          # List all APKs
          echo "=== All APKs ==="
          find . -name "*.apk" -exec ls -lh {} \;
          
          # Create release notes
          cat > release_notes.md << EOF
          # PHTunnel v1.1.0 for OpenWrt 25.12.x
          
          ## Architecture Support
          - **qualcommax (aarch64_cortex-a53)** ✅
          - **x86_64** ✅  
          - **mediatek (armv7)** ✅
          - **ramips (mipsel)** ✅
          - **ath79 (mips)** ✅
          - **bcm27xx (armv7)** ✅
          
          ## Package Information
          - **Total packages**: $TOTAL_APKS
          - **phtunnel packages**: $PHTUNNEL_COUNT
          - **luci-app-phtunnel packages**: $LUCI_COUNT
          - **Version**: 1.0.0-r2
          
          ## Installation
          1. Download appropriate APK for your architecture
          2. Install using: \`opkg install phtunnel_1.0.0-r2.apk\`
          3. For web interface: \`opkg install luci-app-phtunnel_2.0.0-r2.apk\`
          
          ## Project Status
          - ✅ Build system working
          - ✅ All 6 mainstream architectures supported
          - ✅ Both core and web interface packages
          - ✅ Multi-architecture automation
          - ✅ Release system operational
          
          ## Supported Architectures
          This release includes packages for all mainstream OpenWrt 25.12.x architectures:
          - ARM Cortex-A53 (qualcommax)
          - x86_64 systems
          - ARM Cortex-A7 (mediatek, bcm27xx)
          - MIPS (ramips, ath79)
          
          ## System Requirements
          - OpenWrt 25.12.x
          - APK package support
          - Compatible architecture (see list above)
          EOF
          
          # Create release
          RELEASE_TAG="v1.1.0"
          
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Updating existing release..."
            gh release edit "$RELEASE_TAG" --notes-file release_notes.md
          else
            echo "Creating new release..."
            gh release create "$RELEASE_TAG" \
              --title "PHTunnel v1.1.0 for OpenWrt 25.12.x - Multi-Architecture" \
              --notes-file release_notes.md \
              $(find . -name "*.apk")
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}