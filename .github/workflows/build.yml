name: Build phtunnel1

on:
  workflow_dispatch: # 支持手动触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
      - name: Download SDK
        run: |
          # 请根据你的路由器架构更换下方的 SDK 链接
          git clone -b openwrt-24.10 --single-branch --filter=blob:none https://github.com/immortalwrt/immortalwrt
          mv immortalwrt sdk
          git clone https://github.com/oooopera/phtunnel1.git
          

      - name: Build Package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
           
          mv ../phtunnel1/luci-app-phtunnel package/luci-app-phtunnel
          mv ../phtunnel1/phtunnel package/phtunnel

          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          make defconfig
          make package/phtunnel/compile V=s IGNORE_ERRORS=1
          make package/luci-app-phtunnel/compile V=s IGNORE_ERRORS=1
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel1-ipk
          path: sdk/bin/packages/*/base/*.ipk
