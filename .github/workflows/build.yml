name: Build PHTunnel IPK for OpenWrt 25.12.x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - name: x86_64
            arch: x86
            subtarget: 64
            sdk_arch: x86-64
          - name: aarch64_cortex-a53
            arch: aarch64
            subtarget: generic
            sdk_arch: aarch64_cortex-a53
          - name: aarch64_generic
            arch: aarch64
            subtarget: generic
            sdk_arch: aarch64_generic
          - name: arm_cortex-a7
            arch: arm
            subtarget: cortex-a7
            sdk_arch: arm_cortex-a7_neon-vfpv4
          - name: arm_cortex-a9
            arch: arm
            subtarget: cortex-a9
            sdk_arch: arm_cortex-a9_neon
          - name: mips_24kc
            arch: mips
            subtarget: 24kc
            sdk_arch: mips_24kc
          - name: mipsel_24kc
            arch: mipsel
            subtarget: 24kc
            sdk_arch: mipsel_24kc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 unzip python3-pyelftools \
            python3-setuptools python3-distutils rsync subversion swig time \
            xsltproc zlib1g-dev

      - name: Download SDK
        run: |
          # OpenWrt 24.10.0 SDK (stable, uses IPK format)
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/targets/${{ matrix.target.arch }}/${{ matrix.target.subtarget }}/openwrt-sdk-24.10.0-${{ matrix.target.sdk_arch }}_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          echo "Downloading SDK from: $SDK_URL"
          curl -L $SDK_URL -o sdk.tar.xz || { echo "SDK download failed for ${{ matrix.target.name }}"; exit 1; }
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

          # Clone plugin source
          git clone https://github.com/sdpong/phtunnel1.git source_tmp

      - name: Build Package
        run: |
          cd sdk

          # Add LuCI feeds
          echo "src-git luci https://git.openwrt.org/project/luci.git;openwrt-24.10" >> feeds.conf.default

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy source to SDK package directory
          cp -r ../source_tmp/luci-app-phtunnel package/
          cp -r ../source_tmp/phtunnel package/

          # Configure and compile
          make defconfig

          # Enable phtunnel and luci-app-phtunnel
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config

          # Ensure dependencies are compiled
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config || echo "CONFIG_PACKAGE_luci-lib-json=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config

          # Set target architecture
          case "${{ matrix.target.arch }}" in
            x86)
                echo "CONFIG_TARGET_x86=y" >> .config
                echo "CONFIG_TARGET_x86_64=y" >> .config
                ;;
            aarch64)
                echo "CONFIG_TARGET_aarch64=y" >> .config
                echo "CONFIG_TARGET_${{ matrix.target.sdk_arch }}=y" >> .config
                ;;
            arm)
                echo "CONFIG_TARGET_arm=y" >> .config
                echo "CONFIG_TARGET_${{ matrix.target.sdk_arch }}=y" >> .config
                ;;
            mips|mipsel)
                echo "CONFIG_TARGET_${{ matrix.target.arch }}=y" >> .config
                echo "CONFIG_TARGET_${{ matrix.target.sdk_arch }}=y" >> .config
                ;;
          esac

          # Build packages
          make package/phtunnel/compile V=s || { echo "phtunnel build failed for ${{ matrix.target.name }}"; exit 1; }
          make package/luci-app-phtunnel/compile V=s || { echo "luci-app-phtunnel build failed for ${{ matrix.target.name }}"; exit 1; }

      - name: Prepare Artifacts
        run: |
          mkdir -p publish/${{ matrix.target.name }}

          # Find IPK packages
          find sdk/bin/packages/ -name "*.ipk" -exec cp {} publish/${{ matrix.target.name }}/ \;

          # List found packages
          echo "Packages for ${{ matrix.target.name }}:"
          ls -lh publish/${{ matrix.target.name }}/ || echo "No packages found for ${{ matrix.target.name }}"

          # Set timestamp tag for Release
          if [ "${{ matrix.target.name }}" = "x86_64" ]; then
            echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-${{ matrix.target.name }}-ipk
          path: publish/${{ matrix.target.name }}/*.ipk
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare Combined Release
        run: |
          mkdir -p combined-release
          find all-artifacts -name "*.ipk" -exec cp {} combined-release/ \;
          ls -lh combined-release/

      - name: Create Combined Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-$(date +"%Y.%m.%d-%H%M")
          name: PHTunnel Combined Release - All Architectures (IPK)
          files: combined-release/*.ipk
          body: |
            Build Date: 2026.04.05
            Target: OpenWrt 24.10.0 (Multiple Architectures)
            Package Format: IPK (OpenWrt standard format)

            Supported Architectures:
            - x86_64 (Intel/AMD 64-bit)
            - aarch64_cortex-a53 (ARM 64-bit, Cortex-A53)
            - aarch64_generic (ARM 64-bit, Generic)
            - arm_cortex-a7 (ARM 32-bit, Cortex-A7)
            - arm_cortex-a9 (ARM 32-bit, Cortex-A9)
            - mips_24kc (MIPS 32-bit, 24KC)
            - mipsel_24kc (MIPSel 32-bit, 24KC)

            Included Packages:
            - phtunnel_1.0.0-2_*.ipk (core daemon)
            - luci-app-phtunnel_1.0.0-2_all.ipk (web interface)

            Compatibility:
            OpenWrt 21.02 and above (IPK format)
            OpenWrt 24.10.x (IPK format)
            OpenWrt 25.11.x and below (APK format - not compatible)

            This release is adapted for OpenWrt 24.10.0:
            - Modern LuCI controller API
            - Enhanced procd service management
            - Complete UCI permissions
            - IPK package format (compatible with most versions)

            Please install packages matching your device architecture using:
            ```bash
            opkg install phtunnel_1.0.0-2_*.ipk
            opkg install luci-app-phtunnel_1.0.0-2_all.ipk
            ```
          env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
