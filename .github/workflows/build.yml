name: Build PHTunnel APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: x86_64
            sdk_target: x86
            sdk_subtarget: 64
            pkg_arch: x86_64
          - arch: aarch64
            sdk_target: aarch64
            sdk_subtarget: generic
            pkg_arch: aarch64
          - arch: armv7
            sdk_target: arm
            sdk_subtarget: cortex-a7
            pkg_arch: armv7
          - arch: mips
            sdk_target: mips
            sdk_subtarget: 24kc
            pkg_arch: mips
          - arch: mipsel
            sdk_target: mipsel
            sdk_subtarget: 24kc
            pkg_arch: mipsel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 unzip rsync subversion \
            xsltproc zlib1g-dev

      - name: Download SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/targets/${{ matrix.sdk_target }}/${{ matrix.sdk_subtarget }}/openwrt-sdk-24.10.0-${{ matrix.arch }}_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          echo "Downloading SDK from: $SDK_URL"
          curl -L $SDK_URL -o sdk.tar.xz
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

      - name: Download phtunnel binary
        run: |
          cd sdk
          
          # Determine architecture for binary download
          case "${{ matrix.arch }}" in
            x86_64)
              BINARY_ARCH="x86_64"
              ;;
            aarch64)
              BINARY_ARCH="aarch64"
              ;;
            armv7)
              BINARY_ARCH="arm_cortex-a7_neon-vfpv4"
              ;;
            mips)
              BINARY_ARCH="mips_24kc"
              ;;
            mipsel)
              BINARY_ARCH="mipsel_24kc"
              ;;
          esac
          
          BINARY_URL="https://mirrors.oray.com/orayos/packages/phtunnel/${BINARY_ARCH}/1.0.0/bin/phtunnel"
          echo "Downloading phtunnel binary from: $BINARY_URL"
          curl -L "$BINARY_URL" -o package/phtunnel/files/usr/sbin/phtunnel
          chmod +x package/phtunnel/files/usr/sbin/phtunnel

      - name: Clone LuCI and feeds
        run: |
          cd sdk
          echo "src-git luci https://git.openwrt.org/project/luci.git;openwrt-24.10" >> feeds.conf.default
          echo "src-git packages https://git.openwrt.org/feed/packages.git;openwrt-24.10" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package sources
        run: |
          cd sdk
          cp -r ${{ github.workspace }}/luci-app-phtunnel package/
          cp -r ${{ github.workspace }}/phtunnel package/

      - name: Configure build
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config || echo "CONFIG_PACKAGE_luci-lib-json=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_TARGET_${{ matrix.arch }}=y" >> .config
          make oldconfig

      - name: Build IPK packages
        run: |
          cd sdk
          make package/luci-app-phtunnel/compile V=s || { echo "Build failed"; exit 1; }

      - name: Convert IPK to APK
        run: |
          cd sdk
          mkdir -p output
          
          for ipk in $(find bin/packages -name "*.ipk"); do
            pkg_name=$(basename "$ipk" .ipk)
            version=$(basename "$ipk" .ipk | sed 's/.*_//; s/\-[0-9]*$//')
            workdir=$(mktemp -d)
            
            echo "Converting $pkg_name to APK..."
            
            mkdir -p "$workdir/apk"
            tar -xzf "$ipk" -C "$workdir/apk"
            
            # Create .PKGINFO
            cat > "$workdir/.PKGINFO" << EOF
pkgname = $pkg_name
pkgver = 1.0.0-r2
pkgdesc = PHTunnel package for OpenWrt
url = https://hsk.oray.com/
builddate = $(date -u +%Y%m%d%H%M%S)
packager = OpenWrt Build System
size = $(du -sb "$workdir/apk" | cut -f1)
arch = ${{ matrix.pkg_arch }}
license = GPL-2.0-only
maintainer = Oray <developer@oray.com>
origin = openwrt
EOF
            
            # Create install scripts
            cat > "$workdir/.pre-install" << 'INSTEOF'
#!/bin/sh
# Stop service if running
if [ -f /etc/init.d/phtunnel ]; then
    /etc/init.d/phtunnel stop
fi
exit 0
INSTEOF
            
            cat > "$workdir/.post-install" << 'INSTEOF'
#!/bin/sh
# Enable service
if [ -f /etc/init.d/phtunnel ]; then
    /etc/init.d/phtunnel enable
fi
exit 0
INSTEOF
            
            chmod +x "$workdir/.pre-install" "$workdir/.post-install"
            
            # Create APK
            cd "$workdir/apk"
            apk_name="${pkg_name}_1.0.0-r2_${{ matrix.pkg_arch }}.apk"
            tar -czf "../../../output/$apk_name" .PKGINFO .pre-install .post-install *
            
            echo "Created: $apk_name"
            rm -rf "$workdir"
          done
          
          ls -lh output/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-${{ matrix.arch }}-apk
          path: output/*.apk

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release
        run: |
          mkdir -p release
          find . -name "*.apk" -exec cp {} release/ \;
          ls -lh release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-$(date +"%Y.%m.%d-%H%M")
          name: PHTunnel APK Release
          files: release/*.apk
          body: |
            Build Date: 2026.04.05
            Target: OpenWrt 24.10.0
            Package Format: APK (converted from IPK)
            Architectures: x86_64, aarch64, armv7, mips, mipsel
            Installation: opkg install phtunnel_1.0.0-2_*.apk
