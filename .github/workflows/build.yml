name: Build PHTunnel for OpenWrt 25.12.x

on:
  workflow_dispatch:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download and extract SDK
        run: |
          set -x
          
          echo "=== Building PHTunnel core package ==="
          echo "=== Downloading SDK..."
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/qualcommax/ipq807x/openwrt-sdk-25.12.2.ipq807x.tar.zst"
          curl -fL "${SDK_URL}" -o sdk.tar.zst
          echo "Extracting SDK..."
          tar -xf sdk.tar.zst

      - name: Setup build environment
        run: |
          set -x
          
          echo "=== Setting up build environment ==="
          
          cd openwrt-sdk/
          
          # Update feeds
          echo "Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Set environment variables - CRITICAL: Use BINARY_ARCH instead of BINARY_ARCH
          echo "Setting environment variables..."
          export ARCH="aarch64"
          export BINARY_ARCH="aarch64"
          export CONFIG_USE_APK="y"
          
          # Configure build
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_USE_APK=y" >> .config
          echo "CONFIG_ALL_NONSHARED=y" >> .config
          echo "CONFIG_APK=y" >> .config
          make oldconfig

      - name: Build phtunnel (with detailed logging)
        run: |
          set -x
          
          echo "=== Building phtunnel with full logging ==="
          
          if make package/phtunnel/compile V=s 2>&1 | tee phtunnel-build.log; then
            echo "✅ phtunnel build succeeded"
            echo "=== Build log summary ==="
            echo "Last 20 lines of build log:"
            tail -20 phtunnel-build.log
          else
            echo "❌ phtunnel build failed"
            echo "=== Build log summary ==="
            echo "Last 20 lines of build log:"
            tail -20 phtunnel-build.log
            cat phtunnel-build.log | grep -A 10 -B 5 "ERROR\|error\|No binary\|missing\|undefined" || true
            exit 1
          fi
          
          echo "=== Build completed successfully"

      - name: Upload APK artifacts
        run: |
          set -x
          
          echo "=== Checking for all package files ==="
          find bin -name "*.apk" -exec ls -lh {} \;
          
          echo "=== Collecting all packages ==="
          mkdir -p "${GITHUB_WORKSPACE}/build/apks"
          find bin -name "*.apk" -exec cp {} "${GITHUB_WORKSPACE}/build/apks/" \;
          
          echo "=== APK packages collected ==="
          ls -lh "${GITHUB_WORKSPACE}/build/apks/"
          
          APK_COUNT=$(find "${GITHUB_WORKSPACE}/build/apks" -name '*.apk' 2>/dev/null | wc -l)
          echo "Total APK packages: $APK_COUNT"
          
          echo "=== Checking for phtunnel package specifically ==="
          find bin -name "phtunnel*.apk" -exec ls -lh {} \;

      - name: Create Release
        if: success()
          run: |
            set -x
            
            echo "=== Creating GitHub Release ==="
            
            # Get version
            VERSION="1.0.0.0.5"
            RELEASE_TAG="v${VERSION}"
            
            echo "Creating release: ${RELEASE_TAG}"
            
            # Delete existing tag
            gh release delete "${RELEASE_TAG}" || echo "No existing tag found"
            
            # Create release
            APK_FILES=$(find "${GITHUB_WORKSPACE}/build/apks" -name "phtunnel_*.apk" -o -name "luci-app-phtunnel_*.apk" -o -name "libgcc*.apk" -o -name "libc*.apk")
            APK_COUNT=$(echo $APK_FILES | wc -l)
            
            echo "Found $APK_COUNT APK files to upload"
            
            if [ "$APK_COUNT" -eq 0 ]; then
              echo "ERROR: No APK files found in build/apks directory"
              exit 1
            fi
            
            # Create release notes
            cat > release_notes.md << 'EOF'
## PHTunnel v1.0.0.0.5 for OpenWrt 25.12.x

## Successfully Built Architecture
- **qualcommx (aarch64_cortex-a53)** ✅

## Installation
```bash
opkg install phtunnel_1.0.0.0-r5.apk
opkg install luci-app-phtunnel_1.0.0.0-r5.apk
```

## Included Packages
- ✅ **phtunnel_1.0.0.0-r5.apk** (phtunnel core package)
- ✅ **luci-app-phtunnel_1.0.0.0-r5.apk** (LuCI interface)
- ✅ libgcc1-14.3.0-r5.apk (dependency)
- ✅ libc-1.2.5-r5.apk (dependency)
- ✅ libpthread-1.2.5-r5.apk (dependency)
- ✅ librt-1.2.5-r5.apk (dependency)

## Features
- HSK内网穿透功能
- 无需端口转发
- 端到端TLS加密
- 黑/白名单验证
EOF
            
            # Upload each APK file
            for APK_FILE in $APK_FILES; do
              echo "Uploading $APK_FILE..."
              gh release upload "${RELEASE_TAG}" "$APK_FILE"
            done
            
            echo "✅ Release created: ${RELEASE_TAG}"
            
            echo "=== Release URL ==="
            gh release view "${RELEASE_TAG}" --web
          fi