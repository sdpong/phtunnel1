name: Build PHTunnel APK for OpenWrt 25.12.x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - name: x86_64
            arch: x86
            subtarget: 64
            sdk_arch: x86-64
            pkg_arch: x86_64
          - name: aarch64_cortex-a53
            arch: aarch64
            subtarget: generic
            sdk_arch: aarch64_cortex-a53
            pkg_arch: aarch64
          - name: aarch64_generic
            arch: aarch64
            subtarget: generic
            sdk_arch: aarch64_generic
            pkg_arch: aarch64
          - name: arm_cortex-a7
            arch: arm
            subtarget: cortex-a7
            sdk_arch: arm_cortex-a7_neon-vfpv4
            pkg_arch: armv7
          - name: arm_cortex-a9
            arch: arm
            subtarget: cortex-a9
            sdk_arch: arm_cortex-a9_neon
            pkg_arch: armv7
          - name: mips_24kc
            arch: mips
            subtarget: 24kc
            sdk_arch: mips_24kc
            pkg_arch: mips
          - name: mipsel_24kc
            arch: mipsel
            subtarget: 24kc
            sdk_arch: mipsel_24kc
            pkg_arch: mipsel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 unzip rsync subversion \
            xsltproc zlib1g-dev

      - name: Download SDK
        run: |
          # OpenWrt 24.10.0 SDK (proven stable)
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/targets/${{ matrix.target.arch }}/${{ matrix.target.subtarget }}/openwrt-sdk-24.10.0-${{ matrix.target.sdk_arch }}_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          echo "Downloading SDK from: $SDK_URL"
          curl -L $SDK_URL -o sdk.tar.xz || { echo "SDK download failed for ${{ matrix.target.name }}"; exit 1; }
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

          # Clone plugin source
          git clone https://github.com/sdpong/phtunnel1.git source_tmp

      - name: Build IPK Packages
        run: |
          cd sdk

          # Add LuCI feeds
          echo "src-git luci https://git.openwrt.org/project/luci.git;openwrt-24.10" >> feeds.conf.default

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy source to SDK package directory
          cp -r ../source_tmp/luci-app-phtunnel package/
          cp -r ../source_tmp/phtunnel package/

          # Configure and compile
          make defconfig

          # Enable packages
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config

          # Dependencies
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config || echo "CONFIG_PACKAGE_luci-lib-json=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config

          # Configure target
          case "${{ matrix.target.arch }}" in
            x86)
                echo "CONFIG_TARGET_x86=y" >> .config
                echo "CONFIG_TARGET_x86_64=y" >> .config
                ;;
            aarch64)
                echo "CONFIG_TARGET_aarch64=y" >> .config
                ;;
            arm)
                echo "CONFIG_TARGET_arm=y" >> .config
                ;;
            mips|mipsel)
                echo "CONFIG_TARGET_${{ matrix.target.arch }}=y" >> .config
                ;;
          esac

          # Build packages
          make package/phtunnel/compile V=s || { echo "phtunnel build failed for ${{ matrix.target.name }}"; exit 1; }
          make package/luci-app-phtunnel/compile V=s || { echo "luci-app-phtunnel build failed for ${{ matrix.target.name }}"; exit 1; }

      - name: Convert IPK to APK
        run: |
          # Create APK packager script
          cat > apk-packager.sh << 'EOF'
          #!/bin/bash
          set -e
          IPK_FILE="$1"
          APK_ARCH="$2"
          OUTPUT_DIR="$3"
          
          PKG_NAME=$(echo "$IPK_FILE" | sed 's/_.*//')
          PKG_VERSION=$(echo "$IPK_FILE" | grep -oP '(?<=_)[0-9]+\.[0-9]+\.[0-9]+-[0-9]+')
          BUILD_DATE=$(date -u +%Y%m%d%H%M%S)
          
          WORKDIR=$(mktemp -d)
          trap "rm -rf $WORKDIR" EXIT
          
          # Extract IPK
          mkdir -p "$WORKDIR/ipk-root"
          tar -xzf "$IPK_FILE" -C "$WORKDIR/ipk-root"
          
          # Calculate package size
          PKG_SIZE=$(du -sb "$WORKDIR/ipk-root" | cut -f1)
          
          # Generate .PKGINFO
          cat > "$WORKDIR/.PKGINFO" << PKGEOF
          pkgname = $PKG_NAME
          pkgver = $PKG_VERSION
          pkgdesc = $(cat "$WORKDIR/ipk-root/control" | sed -n '/^Description:/p' | sed 's/Description: //')
          url = $(cat "$WORKDIR/ipk-root/control" | sed -n '/^Homepage:/p' | sed 's/Homepage: //')
          builddate = $BUILD_DATE
          packager = OpenWrt Build System
          size = $PKG_SIZE
          arch = $APK_ARCH
          license = $(cat "$WORKDIR/ipk-root/control" | sed -n '/^License:/p' | sed 's/License: //')
          maintainer = $(cat "$WORKDIR/ipk-root/control" | sed -n '/^Maintainer:/p' | sed 's/Maintainer: //')
          origin = openwrt
          PKGEOF
          
          # Extract dependencies
          cat "$WORKDIR/ipk-root/control" | sed -n '/^Depends:/p' | sed 's/Depends: //' | sed 's/, /\ndepend = /g' >> "$WORKDIR/.PKGINFO
          
          # Generate .pre-install
          cat > "$WORKDIR/.pre-install" << 'INSTEOF'
          #!/bin/sh
          # Stop service if present
          if [ -f /etc/init.d/phtunnel ]; then
              /etc/init.d/phtunnel stop >/dev/null 2>&1 || true
          fi
          exit 0
          INSTEOF
          
          # Generate .post-install
          cat > "$WORKDIR/.post-install" << 'INSTEOF'
          #!/bin/sh
          # Enable service
          if [ -f /etc/init.d/phtunnel ]; then
              /etc/init.d/phtunnel enable
          fi
          exit 0
          INSTEOF
          
          # Make scripts executable
          chmod +x "$WORKDIR/.pre-install" "$WORKDIR/.post-install"
          
          # Create APK (tar.gz format)
          APK_DIR="$WORKDIR/${PKG_NAME}_${PKG_VERSION}_${APK_ARCH}"
          mkdir -p "$APK_DIR"
          cp -r "$WORKDIR/ipk-root"/* "$APK_DIR/"
          cp "$WORKDIR/.PKGINFO" "$APK_DIR/"
          cp "$WORKDIR/.pre-install" "$APK_DIR/"
          cp "$WORKDIR/.post-install" "$APK_DIR/"
          
          mkdir -p "$OUTPUT_DIR"
          tar -czf "$OUTPUT_DIR/${PKG_NAME}_${PKG_VERSION}_${APK_ARCH}.apk" -C "$WORKDIR" "$(basename "$APK_DIR")"
          
          rm -rf "$WORKDIR"
          EOF
          
          chmod +x apk-packager.sh

      - name: Create APK from IPK
        run: |
          mkdir -p publish/${{ matrix.target.name }}
          
          # Find IPK packages
          find sdk/bin/packages/ -name "*.ipk" | while read ipk; do
            ./apk-packager.sh "$ipk" "${{ matrix.target.pkg_arch }}" "publish/${{ matrix.target.name }}"
          done
          
          # List created APKs
          echo "APK packages for ${{ matrix.target.name }}:"
          ls -lh publish/${{ matrix.target.name }}/ || echo "No APK packages found for ${{ matrix.target.name }}"

          # Set release tag
          if [ "${{ matrix.target.name }}" = "x86_64" ]; then
            echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-${{ matrix.target.name }}-apk
          path: publish/${{ matrix.target.name }}/*.apk
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare Combined Release
        run: |
          mkdir -p combined-release
          find all-artifacts -name "*.apk" -exec cp {} combined-release/ \;
          ls -lh combined-release/

      - name: Create Combined Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-$(date +"%Y.%m.%d-%H%M")
          name: PHTunnel Combined Release - All Architectures (APK)
          files: combined-release/*.apk
          body: |
            Build Date: 2026.04.05
            Target: OpenWrt 24.10.0 (Multiple Architectures)
            Package Format: APK (converted from IPK)
            
            Supported Architectures:
            - x86_64 (Intel/AMD 64-bit)
            - aarch64_cortex-a53 (ARM 64-bit, Cortex-A53)
            - aarch64_generic (ARM 64-bit, Generic)
            - arm_cortex-a7 (ARM 32-bit, Cortex-A7)
            - arm_cortex-a9 (ARM 32-bit, Cortex-A9)
            - mips_24kc (MIPS 32-bit, 24KC)
            - mipsel_24kc (MIPSel 32-bit, 24KC)
            
            Included Packages:
            - phtunnel_1.0.0-2_*.apk (core daemon)
            - luci-app-phtunnel_1.0.0-2_*.apk (web interface)
            
            Compatibility:
            - OpenWrt 24.10.x (tested, converted from IPK)
            - OpenWrt 23.x (should work)
            - OpenWrt 22.x (should work)
            - OpenWrt 21.02 (should work)
            - OpenWrt 19.07 (may work)
            
            Note: These APK packages are created by converting OpenWrt IPK packages to APK format.
            The packages contain all necessary files and metadata for installation via opkg.
            
            Please install packages matching your device architecture using:
            ```bash
            opkg install phtunnel_1.0.0-2_*.apk
            opkg install luci-app-phtunnel_1.0.0-2_*.apk
            ```
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
