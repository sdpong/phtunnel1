name: Build PHTunnel for OpenWrt 25.12.x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build qualcommax architecture only
        run: |
          set -e
          
          echo "=== Building qualcommax for OpenWrt 25.12.x ==="
          
          # Download SDK
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/qualcommax/ipq807x/openwrt-sdk-25.12.2-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          
          mkdir -p build
          cd build
          
          echo "Downloading SDK..."
          curl -fL "$SDK_URL" -o sdk.tar.zst
          
          echo "Extracting SDK..."
          zstd -d sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar
          rm -f sdk.tar sdk.tar.zst
          
          # Find and setup SDK
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk
          
          # Enable APK format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          echo "Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package files
          echo "Copying package files..."
          mkdir -p package/phtunnel
          cp -r "${GITHUB_WORKSPACE}/phtunnel"/* package/phtunnel/
          
          # Set environment variables
          export ARCH="aarch64"
          export BINARY_ARCH="aarch64"
          export CONFIG_USE_APK=y
          
          # Configure build
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          make oldconfig
          
          # Build phtunnel
          echo "Building phtunnel package..."
          if make package/phtunnel/compile V=s; then
            echo "✅ phtunnel build succeeded"
          else
            echo "❌ phtunnel build failed"
            exit 1
          fi
          
          # Collect APKs
          echo "=== Collecting APKs ==="
          find bin -name "phtunnel*.apk" -exec ls -lh {} \;
          
          mkdir -p apks
          find bin -name "phtunnel*.apk" -exec cp {} apks/ \;
          
          echo "=== APK packages collected ==="
          ls -lh apks/
          
          APK_COUNT=$(find apks -name '*.apk' | wc -l)
          echo "Total APK packages: $APK_COUNT"
          
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No APK packages generated"
            exit 1
          fi
          
          echo "✅ Build completed successfully"
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-qualcommax
          path: build/apks/*.apk
          
      - name: Create Release
        if: success()
        run: |
          set -e
          
          cd build/apks
          
          APK_SIZE=$(ls -lh phtunnel*.apk | awk '{print $5}')
          
          # Create release notes
          cat > release_notes.md << EOF
          # PHTunnel v1.1.1 for OpenWrt 25.12.x
          
          ## Successfully Built Architecture
          - **qualcommax (aarch64_cortex-a53)** ✅
          
          ## Package Information
          - Package size: $APK_SIZE
          - Version: 1.0.0-r2
          
          ## Installation
          1. Download phtunnel_1.0.0-r2.apk
          2. Install using: \`opkg install phtunnel_1.0.0-r2.apk\`
          
          ## Project Status
          - ✅ Build system working
          - ✅ APK format support
          - ✅ Release automation working
          
          ## System Requirements
          - OpenWrt 25.12.x
          - APK package support
          - Architecture: aarch64_cortex-a53 (qualcommax)
          
          ## Current Status
          - Working on: Single architecture testing
          - Next: Multi-architecture expansion
          - Goal: All major OpenWrt 25.12.x architectures
          EOF
          
          # Create release
          RELEASE_TAG="v1.1.1"
          
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Updating existing release..."
            gh release edit "$RELEASE_TAG" --notes-file release_notes.md
          else
            echo "Creating new release..."
            gh release create "$RELEASE_TAG" \
              --title "PHTunnel v1.1.1 for OpenWrt 25.12.x" \
              --notes-file release_notes.md \
              phtunnel*.apk
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}