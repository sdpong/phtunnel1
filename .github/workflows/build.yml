name: Build phtunnel1

on:
  workflow_dispatch: # 支持手动触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
      - name: Download SDK
        run: |
          # 这里以 ImmortalWrt 24.10 x86_64 为例
          # 如果你的路由器不是这个架构，请更换下方 URL
          SDK_URL="https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          wget $SDK_URL -O sdk.tar.xz
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          
          # 克隆你的插件源码
          git clone https://github.com/oooopera/phtunnel1.git
          

      - name: Build Package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
           
          mv ../phtunnel1/luci-app-phtunnel package/luci-app-phtunnel
          mv ../phtunnel1/phtunnel package/phtunnel

          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          make defconfig
          make package/phtunnel/compile V=s IGNORE_ERRORS=1
          make package/luci-app-phtunnel/compile V=s IGNORE_ERRORS=1
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel1-ipk
          path: sdk/bin/packages/*/base/*.ipk
