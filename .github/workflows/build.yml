name: Build PHTunnel APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - name: x86_64
            arch: x86_64
          - name: aarch64
            arch: aarch64
          - name: armv7
            arch: armv7
          - name: mips
            arch: mips
          - name: mipsel
            arch: mipsel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Test
        run: |
          echo "Building for ${{ matrix.target.arch }}"
          echo "Test workflow"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.target.name }}
          path: README.md
