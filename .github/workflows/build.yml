name: Build PHTunnel APK for OpenWrt 25.12.x

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture (x86_64, aarch64, arm, mips, mipsel)'
        required: true
        type: choice
        options:
          - x86_64
          - aarch64
          - armv7
          - mips
          - mipsel
        default: x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git g++ libelf-dev libncurses5-dev libssl-dev

      - name: Download SDK
        run: |
          # Map inputs to architecture values
          case "${{ inputs.target }}" in
            x86_64)
              ARCH="x86"
              SDK_ARCH="x86_64"
              PKG_ARCH="x86_64"
              BINARY_ARCH="x86_64"
              ;;
            aarch64)
              ARCH="aarch64"
              SDK_ARCH="aarch64"
              PKG_ARCH="aarch64_generic"
              BINARY_ARCH="aarch64_cortex-a53"
              ;;
            armv7)
              ARCH="arm"
              SDK_ARCH="arm"
              PKG_ARCH="armv7"
              BINARY_ARCH="arm_cortex-a7_neon-vfpv4"
              ;;
            mips)
              ARCH="mips"
              SDK_ARCH="mips"
              PKG_ARCH="mips_24kc"
              BINARY_ARCH="mips_24kc"
              ;;
            mipsel)
              ARCH="mipsel"
              SDK_ARCH="mipsel"
              PKG_ARCH="mipsel_24kc"
              BINARY_ARCH="mipsel_24kc"
              ;;
            *)
              echo "Unsupported architecture: ${{ inputs.target }}"
              exit 1
              ;;
          esac

          # OpenWrt 25.12.1 SDK
          SDK_URL="https://downloads.openwrt.org/releases/25.12.1/targets/$ARCH/$BINARY_ARCH/openwrt-sdk-25.12.1-$SDK_ARCH_gcc-14.2.1_musl.Linux-x86_64.tar.xz"
          echo "Downloading SDK from: $SDK_URL"
          curl -L "$SDK_URL" -o sdk.tar.xz
          tar -xf sdk.tar.xz

          # Clone package source
          git clone https://github.com/sdpong/phtunnel1.git source_tmp

      - name: Setup Build
        run: |
          cd sdk

          # Update feeds
          echo "src-git luci https://git.openwrt.org/project/luci.git;openwrt-25.12" >> feeds.conf.default
          echo "src-git packages https://git.openwrt.org/feed/packages.git;openwrt-25.12" >> feeds.conf.default

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy packages
          cp -r ../source_tmp/luci-app-phtunnel package/
          cp -r ../source_tmp/phtunnel package/

          # Configure
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-json=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_TARGET=$ARCH=y" >> .config
          make oldconfig

      - name: Build Packages
        run: |
          cd sdk
          make package/phtunnel/compile V=s
          make package/luci-app-phtunnel/compile V=s

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-${{ inputs.target }}
          path: sdk/bin/packages/**/*.apk
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Prepare Release
        run: |
          mkdir -p release
          find apks -name "*.apk" -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-1
          name: PHTunnel v1.0.0-1 for OpenWrt 25.12.x
          files: release/*.apk
          body: |
            ## PHTunnel v1.0.0-1

            **OpenWrt 25.12.1+ Only**

            ### Download

            ### x86_64
            - phtunnel_1.0.0-1_x86_64.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### aarch64
            - phtunnel_1.0.0-1_aarch64.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### ARMv7
            - phtunnel_1.0.0-1_armv7.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### MIPS
            - phtunnel_1.0.0-1_mips.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### MIPSel
            - phtunnel_1.0.0-1_mipsel.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### Installation

            ```bash
            apk add phtunnel_1.0.0-1_*.apk
            apk add luci-app-phtunnel_1.0.0-1_all.apk
            ```

            ---

            **Compatibility**

            ✅ OpenWrt 25.12.x and above
            ❌ OpenWrt 25.11.x and below (not supported, uses IPK)

            **Changes in v1.0.0-1**

            - Optimized for OpenWrt 25.12.1+
            - Removed all legacy/downward compatibility code
            - Simplified dependencies
            - Native APK package format
            - Enhanced procd service management
            - Complete UCI permissions
            - Reduced to 5 architectures
            - Streamlined build process
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
