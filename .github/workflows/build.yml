name: Build PHTunnel APK for OpenWrt 25.12.x

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture (x86_64, aarch64, arm, mips, mipsel)'
        required: true
        type: choice
        options:
          - x86_64
          - aarch64
          - armv7
          - mips
          - mipsel
        default: x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git g++ libelf-dev libncurses5-dev libssl-dev zstd

      - name: Download OpenWrt 25.12.2 SDK
        run: |
          case "${{ inputs.target }}" in
            x86_64)
              ARCH="x86"
              SDK_ARCH="x86-64"
              BINARY_ARCH="64"
              ;;
            aarch64)
              ARCH="qualcommax"
              SDK_ARCH="ipq807x"
              BINARY_ARCH="generic"
              ;;
            armv7)
              ARCH="mediatek"
              SDK_ARCH="mt7622"
              BINARY_ARCH="generic"
              ;;
            mips)
              ARCH="ath79"
              SDK_ARCH="generic"
              BINARY_ARCH="generic"
              ;;
            mipsel)
              ARCH="ramips"
              SDK_ARCH="mt7620"
              BINARY_ARCH="generic"
              ;;
            *)
              echo "Unsupported architecture"
              exit 1
              ;;
          esac

          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/$ARCH/$BINARY_ARCH/openwrt-sdk-25.12.2-${SDK_ARCH}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "Downloading SDK from: $SDK_URL"
          curl -L "$SDK_URL" -o sdk.tar.zst
          tar -xf sdk.tar.zst

          SDK_DIR=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
          if [ -n "$SDK_DIR" ]; then
            mv "$SDK_DIR" sdk
          fi

      - name: Setup Build Environment
        run: |
          cd sdk

          # Enable APK package format for OpenWrt 25.12.x
          echo "CONFIG_USE_APK=y" >> .config

          # Update and install feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy package source
          cp -r ../luci-app-phtunnel package/
          cp -r ../phtunnel package/

          # Configure build options
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          make oldconfig

      - name: Build Packages with APK Format
        run: |
          cd sdk
          # Ensure APK format is used
          export CONFIG_USE_APK=y
          make package/phtunnel/compile V=s
          make package/luci-app-phtunnel/compile V=s

      - name: Verify APK Packages
        run: |
          cd sdk
          echo "=== Checking for APK packages ==="
          find bin/packages -name "*.apk" -exec ls -lh {} \; || echo "No APK packages found"

          echo "=== Checking for package directories ==="
          find bin/packages -type d | head -20

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-packages-${{ inputs.target }}
          path: sdk/bin/packages/**/*.apk
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Prepare Release
        run: |
          mkdir -p release
          find packages -name "*.apk" | xargs -I {} cp {} release/
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-2
          name: PHTunnel v1.0.0-2 for OpenWrt 25.12.x (APK Format)
          files: release/*.apk
          body: |
            ## PHTunnel v1.0.0-2

            **OpenWrt 25.12.x (APK Format Only)**

            ### Download

            ### x86_64
            - phtunnel_1.0.0-2_x86_64.apk
            - luci-app-phtunnel_1.0.0-2_all.apk

            ### aarch64
            - phtunnel_1.0.0-2_aarch64.apk
            - luci-app-phtunnel_1.0.0-2_all.apk

            ### ARMv7
            - phtunnel_1.0.0-2_armv7.apk
            - luci-app-phtunnel_1.0.0-2_all.apk

            ### MIPS
            - phtunnel_1.0.0-2_mips.apk
            - luci-app-phtunnel_1.0.0-2_all.apk

            ### MIPSel
            - phtunnel_1.0.0-2_mipsel.apk
            - luci-app-phtunnel_1.0.0-2_all.apk

            ### Installation

            **For OpenWrt 25.12.x (APK format):**
            ```bash
            apk add phtunnel_1.0.0-2_*.apk
            apk add luci-app-phtunnel_1.0.0-2_all.apk
            ```

            ### Important Notes

            - **This version ONLY supports OpenWrt 25.12.x and above**
            - **Uses APK package format (not IPK)**
            - **For OpenWrt 23.05.x and 24.10.x, please use v1.0.0-1**

            ### Changes in v1.0.0-2

            - Updated to use OpenWrt 25.12.2 SDK
            - Fixed APK package format compatibility
            - Resolved "unexpected end of file" installation error
            - Enhanced for OpenWrt 25.12.x APK format
            - Improved procd service management
            - Complete UCI permissions configuration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}