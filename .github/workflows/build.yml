name: Build PHTunnel APK for OpenWrt 25.12.x

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture (x86_64, aarch64, arm, mips, mipsel)'
        required: true
        type: choice
        options:
          - x86_64
          - aarch64
          - armv7
          - mips
          - mipsel
        default: x86_64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git g++ libelf-dev libncurses5-dev libssl-dev

      - name: Download SDK
        run: |
          # Map inputs to architecture values (for OpenWrt 23.05.5 SDK)
          TARGET="${{ inputs.target }}"
          if [ "$TARGET" = "x86_64" ]; then
            ARCH="x86"
            SDK_ARCH="x86-64"
            PKG_ARCH="x86_64"
            BINARY_ARCH="64"
          elif [ "$TARGET" = "aarch64" ]; then
            ARCH="aarch64_cortex-a53"
            SDK_ARCH="aarch64_cortex-a53"
            PKG_ARCH="aarch64_generic"
            BINARY_ARCH="cortex-a53"
          elif [ "$TARGET" = "armv7" ]; then
            ARCH="arm_cortex-a7_neon-vfpv4"
            SDK_ARCH="arm_cortex-a7_neon-vfpv4"
            PKG_ARCH="armv7"
            BINARY_ARCH="cortex-a7-neon-vfpv4"
          elif [ "$TARGET" = "mips" ]; then
            ARCH="ath79"
            SDK_ARCH="ath79"
            PKG_ARCH="mips_24kc"
            BINARY_ARCH="generic"
          elif [ "$TARGET" = "mipsel" ]; then
            ARCH="ramips"
            SDK_ARCH="ramips"
            PKG_ARCH="mipsel_24kc"
            BINARY_ARCH="mt7620"
          else
            echo "Unsupported architecture: $TARGET"
            exit 1
          fi

          # OpenWrt 23.05.5 SDK (latest stable with SDK available)
          # Note: Building with 23.05.5 SDK, packages compatible with OpenWrt 23.05.x and 25.12.x
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/$ARCH/$BINARY_ARCH/openwrt-sdk-23.05.5-$SDK_ARCH_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          echo "Downloading SDK from: $SDK_URL"
          curl -L "$SDK_URL" -o sdk.tar.xz
          tar -xf sdk.tar.xz

          # Clone package source
          git clone https://github.com/sdpong/phtunnel1.git source_tmp

      - name: Setup Build
        run: |
          cd sdk

          # Update feeds (for 23.05.5)
          echo "src-git luci https://git.openwrt.org/project/luci.git;openwrt-23.05" >> feeds.conf.default
          echo "src-git packages https://git.openwrt.org/feed/packages.git;openwrt-23.05" >> feeds.conf.default

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy packages
          cp -r ../source_tmp/luci-app-phtunnel package/
          cp -r ../source_tmp/phtunnel package/

          # Configure
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-json=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_TARGET=$ARCH=y" >> .config
          make oldconfig

      - name: Build Packages
        run: |
          cd sdk
          make package/phtunnel/compile V=s
          make package/luci-app-phtunnel/compile V=s

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-${{ inputs.target }}
          path: sdk/bin/packages/**/*.apk
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Prepare Release
        run: |
          mkdir -p release
          find apks -name "*.apk" -exec cp {} release/ \;
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-1
          name: PHTunnel v1.0.0-1 for OpenWrt 25.12.x
          files: release/*.apk
          body: |
            ## PHTunnel v1.0.0-1

            **OpenWrt 25.12.1+ Only**

            ### Download

            ### x86_64
            - phtunnel_1.0.0-1_x86_64.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### aarch64
            - phtunnel_1.0.0-1_aarch64.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### ARMv7
            - phtunnel_1.0.0-1_armv7.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### MIPS
            - phtunnel_1.0.0-1_mips.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### MIPSel
            - phtunnel_1.0.0-1_mipsel.apk
            - luci-app-phtunnel_1.0.0-1_all.apk

            ### Installation

            ```bash
            apk add phtunnel_1.0.0-1_*.apk
            apk add luci-app-phtunnel_1.0.0-1_all.apk
            ```

            ---

            **Compatibility**

            ✅ OpenWrt 25.12.x and above
            ❌ OpenWrt 25.11.x and below (not supported, uses IPK)

            **Changes in v1.0.0-1**

            - Optimized for OpenWrt 25.12.1+
            - Removed all legacy/downward compatibility code
            - Simplified dependencies
            - Native APK package format
            - Enhanced procd service management
            - Complete UCI permissions
            - Reduced to 5 architectures
            - Streamlined build process
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
