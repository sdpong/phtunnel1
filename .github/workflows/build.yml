name: Build PHTunnel APK for OpenWrt 25.12.x

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture (qualcommax, x86, mediatek, ramips, ath79, rockchip, bcm27xx, all)'
        required: true
        type: choice
        options:
          - qualcommax
          - x86
          - mediatek
          - ramips
          - ath79
          - rockchip
          - bcm27xx
          - all
        default: qualcommax

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: qualcommax
            arch: ipq807x
            cpu: aarch64
          - target: x86
            arch: "64"
            cpu: x86_64
          - target: mediatek
            arch: mt7622
            cpu: armv7
          - target: ramips
            arch: mt7620
            cpu: mipsel
          - target: ath79
            arch: generic
            cpu: mips
          - target: rockchip
            arch: generic
            cpu: aarch64
          - target: bcm27xx
            arch: bcm2711
            cpu: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git g++ libelf-dev libncurses5-dev libssl-dev zstd

      - name: Download OpenWrt 25.12.2 SDK
        run: |
          case "${{ matrix.target }}" in
            qualcommax)
              TARGET="qualcommax"
              ARCH="ipq807x"
              ;;
            x86)
              TARGET="x86"
              ARCH="64"
              ;;
            mediatek)
              TARGET="mediatek"
              ARCH="mt7622"
              ;;
            ramips)
              TARGET="ramips"
              ARCH="mt7620"
              ;;
            ath79)
              TARGET="ath79"
              ARCH="generic"
              ;;
            rockchip)
              TARGET="rockchip"
              ARCH="generic"
              ;;
            bcm27xx)
              TARGET="bcm27xx"
              ARCH="bcm2711"
              ;;
            *)
              echo "Unsupported architecture"
              exit 1
              ;;
          esac

          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/${TARGET}/${ARCH}/openwrt-sdk-25.12.2-${ARCH}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "Downloading SDK from: $SDK_URL"
          curl -L "$SDK_URL" -o sdk.tar.zst
          tar -xf sdk.tar.zst

          SDK_DIR=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
          if [ -n "$SDK_DIR" ]; then
            mv "$SDK_DIR" sdk
          fi

      - name: Setup Build Environment
        if: |
          inputs.target == 'all' ||
          inputs.target == matrix.target

        run: |
          cd sdk

          # Enable APK package format for OpenWrt 25.12.x
          echo "CONFIG_USE_APK=y" >> .config

          # Update and install feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy package source
          cp -r ../phtunnel package/
          cp -r ../luci-app-phtunnel package/

          # Configure build options
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          make oldconfig

      - name: Build Packages with APK Format
        if: |
          inputs.target == 'all' ||
          inputs.target == matrix.target

        run: |
          cd sdk
          # Ensure APK format is used
          export CONFIG_USE_APK=y
          make package/phtunnel/compile V=s
          make package/luci-app-phtunnel/compile V=s

      - name: Verify APK Packages
        if: |
          inputs.target == 'all' ||
          inputs.target == matrix.target

        run: |
          cd sdk
          echo "=== Checking for APK packages ==="
          find bin/packages -name "*.apk" -exec ls -lh {} \; || echo "No APK packages found"

      - name: Upload APKs
        if: |
          inputs.target == 'all' ||
          inputs.target == matrix.target

        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-packages-${{ matrix.target }}-${{ matrix.cpu }}
          path: sdk/bin/packages/**/*.apk
          if-no-files-found: error

  release:
    needs: build
    if: always()
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Prepare Release
        run: |
          mkdir -p release
          find packages -name "*.apk" | xargs -I {} cp {} release/
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-2
          name: PHTunnel v1.0.0-2 for OpenWrt 25.12.x (APK Format)
          files: release/*.apk
          body: |
            ## PHTunnel v1.0.0-2 - OpenWrt 25.12.x APK Format

            **Fixed "unexpected end of file" installation error**

            ### Changes

            - Updated to use OpenWrt 25.12.2 SDK
            - Correctly configured APK package format (CONFIG_USE_APK=y)
            - Fixed package structure compatibility
            - Enhanced for OpenWrt 25.12.x APK standard
            - Added support for multiple architectures
            - Used pre-compiled binaries to avoid download failures

            ### Architecture Support

            - **qualcommax/ipq807x** (aarch64) - Priority #1
            - **x86/64** (x86_64) - Priority #2
            - **mediatek/mt7622** (armv7) - Priority #3
            - **ramips/mt7620** (mipsel) - Priority #4
            - **ath79/generic** (mips) - Priority #5
            - **rockchip/generic** (aarch64) - Priority #6
            - **bcm27xx/bcm2711** (armv7) - Priority #7

            ### Installation

            ```bash
            # Upload to router
            scp phtunnel-1.0.0-2_*.apk root@192.168.1.1:/tmp/
            scp luci-app-phtunnel-1.0.0-2_all.apk root@192.168.1.1:/tmp/

            # SSH to router
            ssh root@192.168.1.1
            cd /tmp
            apk add phtunnel-1.0.0-2_*.apk
            apk add luci-app-phtunnel-1.0.0-2_all.apk
            ```

            ### Verification

            ```bash
            # Check OpenWrt version
            cat /etc/openwrt_release

            # Verify installation
            apk info | grep phtunnel

            # Test service
            /etc/init.d/phtunnel status
            ```

            ### Known Issues Fixed

            - ✅ "unexpected end of file" installation error
            - ✅ APK package format incompatibility
            - ✅ Binary download failures
            - ✅ SDK version mismatch

            ### Technical Details

            - OpenWrt SDK: 25.12.2 (not 23.05.5)
            - APK Format: CONFIG_USE_APK=y enabled
            - Binary Source: Pre-compiled local binaries
            - Reference: Based on OpenAppFilter successful build

            ### Support

            For issues or questions, please visit:
            - GitHub Issues: https://github.com/sdpong/phtunnel1/issues
            - OpenWrt Forum: https://forum.openwrt.org/
            - Official Site: https://hsk.oray.com/

            **Note**: This version ONLY supports OpenWrt 25.12.x and above.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}