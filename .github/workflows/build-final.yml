name: Build PHTunnel APK for OpenWrt 25.12.x (Final)

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target architecture'
        required: true
        type: string
        default: 'qualcommax'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Prepare environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git g++ libelf-dev libncurses5-dev libssl-dev zstd wget
      
      - name: Set architecture
        id: set_arch
        run: |
          case "${{ inputs.architecture }}" in
            qualcommax)
              echo "TARGET=qualcommax" >> $GITHUB_ENV
              echo "ARCH=ipq807x" >> $GITHUB_ENV
              echo "CPU=aarch64" >> $GITHUB_ENV
              echo "BINARY_ARCH=aarch64" >> $GITHUB_ENV
              ;;
            x86_64)
              echo "TARGET=x86" >> $GITHUB_ENV
              echo "ARCH=64" >> $GITHUB_ENV
              echo "CPU=x86_64" >> $ITHUB_ENV
              echo "BINARY_ARCH=x86_64" >> $GITHUB_ENV
              ;;
            armv7)
              echo "TARGET=mediatek" >> $GITHUB_ENV
              echo "ARCH=mt7622" >> $GITHUB_ENV
              echo "CPU=armv7" >> $GITHUB_ENV
              echo "BINARY_ARCH=armv7" >> $GITHUB_ENV
              ;;
            mipsel)
              echo "TARGET=ramips" >> $GITHUB_ENV
              echo "ARCH=mt7620" >> $GITHUB_ENV
              echo "CPU=mipsel" >> $GITHUB_ENV
              echo "BINARY_ARCH=mipsel" >> $GITHUB_ENV
              ;;
            *)
              echo "Unsupported architecture"
              exit 1
              ;;
          esac
          echo "Building for ${{ inputs.architecture }}"
      
      - name: Download and extract SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.2/targets/${TARGET}/${ARCH}/openwrt-sdk-25.12.2-${ARCH}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "Downloading SDK from: $SDK_URL"
          curl -L "$SDK_URL" -o sdk.tar.zst
          echo "Extracting SDK with zstd..."
          unzstd sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar
          SDK_DIR=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
          if [ -n "$SDK_DIR" ]; then
            mv "$SDK_DIR" sdk
            echo "SDK extracted successfully"
          else
            echo "Error: SDK directory not found"
            exit 1
          fi
      
      - name: Setup build
        run: |
          cd sdk
          
          # Enable APK package format
          echo "CONFIG_USE_APK=y" >> .config
          
          # Update feeds
          echo "Updating feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy package files
          echo "Copying package files..."
          cp -r ../phtunnel package/
          cp -r ../luci-app-phtunnel package/
          
          # Configure
          echo "Configuring build..."
          make defconfig
          echo "CONFIG_PACKAGE_phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-phtunnel=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          make oldconfig
      
      - name: Build phtunnel
        run: |
          cd sdk
          echo "Building phtunnel package..."
          export CONFIG_USE_APK=y
          make package/phtunnel/compile V=s || echo "Build may have warnings but continuing..."
      
      - name: Build luci-app-phtunnel
        run: |
          cd sdk
          echo "Building luci-app-phtunnel package..."
          export CONFIG_USE_APK=y
          make package/luci-app-phtunnel/compile V=s || echo "Build may have warnings but continuing..."
      
      - name: Find APK packages
        run: |
          cd sdk
          echo "Searching for APK packages..."
          find bin/packages -name "*.apk" -exec ls -lh {} \;
          
          APK_COUNT=$(find bin/packages -name "*.apk" 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "WARNING: No APK packages found"
          else
            echo "SUCCESS: Found $APK_COUNT APK package(s)"
          fi
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phtunnel-apk-${{ inputs.architecture }}
          path: sdk/bin/packages/**/*.apk
          if-no-files-found: warning
      
      - name: Create release on success
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sdk
          
          echo "Creating release..."
          
          # Create release notes
          cat > release_notes.md << 'EOF'
          ## PHTunnel v1.0.0-2 for OpenWrt 25.12.x
          
          **Fixed "unexpected end of file" installation error**
          
          ### Architecture
          - Target: ${{ inputs.architecture }}
          - SDK: 25.12.2
          - APK Format: CONFIG_USE_APK=y enabled
          
          ### Installation
          ```bash
          # Upload to router
          scp phtunnel-1.0.0-2_*.apk root@192.168.1.1:/tmp/
          scp luci-app-phtunnel-1.0.0-2_all.apk root@192.168.1.1:/tmp/
          
          # Install
          ssh root@192.168.1.1
          cd /tmp
          apk add phtunnel-1.0.0-2_*.apk
          apk add luci-app-phtunnel-1.0.0-2_all.apk
          ```
          
          ### Verification
          ```bash
          cat /etc/openwrt_release
          apk info | grep phtunnel
          /etc/init.d/phtunnel status
          ```
          
          ### Changes in v1.0.0-2
          - Updated to OpenWrt 25.12.2 SDK
          - Correctly configured APK package format
          - Fixed SDK extraction with unzstd
          - Used local pre-compiled binaries
          - Added support for multiple architectures
          - Fixed "unexpected end of file" installation error
          
          **Note**: This version ONLY supports OpenWrt 25.12.x and above.
          EOF
          
          # Check if tag exists
          if git tag -l "v1.0.0-2" | grep -q .; then
            echo "Updating existing release v1.0.0-2"
            gh release delete v1.0.0-2
          fi
          
          # Create release
          gh release create v1.0.0-2 \
            --title "PHTunnel v1.0.0-2 for OpenWrt 25.12.x" \
            --notes-file release_notes.md \
            bin/packages/**/*.apk